<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laencasa Ultracongelados</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root {
--primary:#8B0000;
--secondary:#FFD700;
--black:#000;
--white:#fff;
--background:#8B0000;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--background);
color:#fff;
}

.container{
padding:20px 16px 100px;
max-width:600px;
margin:0 auto;
}

/* HEADER */
header{
position:sticky;
top:0;
background:var(--primary);
padding:10px;
z-index:1000;
}

.logo-box{
width:70px;height:70px;border-radius:12px;background:#fff;margin:10px auto;
display:flex;align-items:center;justify-content:center;
}

.logo-box img{width:100%;height:100%;object-fit:cover;}

.header-title{text-align:center;font-size:32px;font-family:'Bangers';}
.header-sub{text-align:center;font-size:18px;font-family:'Bebas Neue';}

/* CARDS */
.card{background:#111;padding:16px;margin-bottom:14px;border-radius:16px;}
.flex{display:flex;justify-content:space-between;align-items:center;}
.primary{background:var(--secondary);color:#000;height:44px;width:100%;}
.small{height:36px;padding:0 14px;}
input,select{width:100%;padding:12px;margin:8px 0 14px;border-radius:12px;border:none;}
.hidden{display:none;}

/* BOTAO CARRINHO */
#cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:var(--secondary);
padding:12px 20px;
border-radius:50px;
font-weight:700;
display:flex;
gap:8px;
z-index:999;
}

/* ===== NOVO VISUAL CHECKOUT ===== */
.screen{
background:#f5f5f5;
min-height:100vh;
padding:20px;
color:#1a1a1a;
}

.topo{
display:flex;
justify-content:flex-end;
margin-bottom:20px;
}

.topo img{
width:50px;
border-radius:10px;
}

.card-white{
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.input-clean{
width:100%;
padding:14px;
border:none;
background:#eee;
border-radius:10px;
margin-bottom:12px;
}

.input-clean:focus{
outline:2px solid var(--primary);
background:#fff;
}

.botao-clean{
width:100%;
padding:16px;
background:var(--primary);
color:#fff;
border:none;
border-radius:30px;
font-weight:600;
margin-top:15px;
}
</style>
</head>

<body>

<header>
<div class="header-title">LAENCASA</div>
<div class="logo-box"><img src="logo.png"></div>
<div class="header-sub">ULTRACONGELADOS • PRATICIDADE • QUALIDADE</div>
</header>

<div class="container" id="app"></div>

<div id="cart-btn" onclick="renderCart()" class="hidden">
🛒 <span id="cart-count">0</span>
</div>

<script>

let cart=[];
let viewStack=[];
let dadosPedido={};
let frete=0;

function navigate(fn){
viewStack.push(fn);
fn();
}

/* ================= PRODUTOS ================= */
const produtos = [
{name:"Lasanha",price:19},
{name:"Frango",price:17},
{name:"Carne",price:20}
];

/* ================= HOME ================= */
function renderHome(){
let html="<h3>Produtos</h3>";

produtos.forEach((p,i)=>{
html+=`
<div class="card flex">
<div>${p.name}<br>R$ ${p.price}</div>
<button class="primary small" onclick="add(${i})">+</button>
</div>`;
});

document.getElementById("app").innerHTML=html;
updateCartButton();
}

/* ================= ADD ================= */
function add(i){
let item=produtos[i];
let f=cart.find(x=>x.name==item.name);

if(f){f.qty++}
else{cart.push({...item,qty:1})}

updateCartButton();
}

/* ================= CARRINHO ================= */
function renderCart(){

let html=`
<div class="screen">
<div class="topo"><img src="logo.png"></div>

<div class="card-white">
<h3>Carrinho</h3>
`;

let subtotal=0;

if(cart.length==0){
html+="Seu carrinho está vazio";
}else{
cart.forEach((i,index)=>{
subtotal+=i.price*i.qty;

html+=`
<div class="flex">
<div>${i.qty}x ${i.name}</div>
<button onclick="removeFromCart(${index})">X</button>
</div>`;
});

html+=`<h4>Total: R$ ${subtotal.toFixed(2)}</h4>`;
html+=`<button class="botao-clean" onclick="navigate(renderCheckout)">Continuar</button>`;
}

html+=`</div></div>`;

document.getElementById("app").innerHTML=html;
}

/* ================= REMOVE ================= */
function removeFromCart(i){
cart.splice(i,1);
renderCart();
updateCartButton();
}

/* ================= CHECKOUT ================= */
function renderCheckout(){

let html=`
<div class="screen">
<div class="topo"><img src="logo.png"></div>

<div class="card-white">
<h3>Seu endereço</h3>

<input class="input-clean" id="nome" placeholder="Seu nome">
<input class="input-clean" id="fone" placeholder="Telefone">

<input class="input-clean" id="endereco" placeholder="Rua">
<input class="input-clean" id="num" placeholder="Número">

<select class="input-clean" id="pag">
<option>Pix</option>
<option>Cartão</option>
</select>

<button class="botao-clean" onclick="revisao()">Continuar</button>

</div></div>`;

document.getElementById("app").innerHTML=html;
}

/* ================= REVISAO ================= */
function revisao(){

dadosPedido={
nome:document.getElementById("nome").value,
fone:document.getElementById("fone").value,
endereco:document.getElementById("endereco").value,
num:document.getElementById("num").value,
pag:document.getElementById("pag").value
};

navigate(renderRevisao);
}

function renderRevisao(){

let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);

let html=`
<div class="screen">
<div class="topo"><img src="logo.png"></div>

<div class="card-white">
<h3>Confirmar Pedido</h3>

<p>${dadosPedido.nome}</p>
<p>${dadosPedido.endereco}, ${dadosPedido.num}</p>

<h4>Total: R$ ${subtotal.toFixed(2)}</h4>

<button class="botao-clean" onclick="finalizar()">Finalizar</button>

</div></div>`;

document.getElementById("app").innerHTML=html;
}

/* ================= FINALIZAR ================= */
function finalizar(){
alert("Pedido enviado pro WhatsApp aqui 🔥");
}

/* ================= CART BTN ================= */
function updateCartButton(){
let btn=document.getElementById("cart-btn");
btn.classList.toggle("hidden",cart.length==0);
document.getElementById("cart-count").innerText=
cart.reduce((s,i)=>s+i.qty,0);
}

navigate(renderHome);

</script>

</body>
</html>
