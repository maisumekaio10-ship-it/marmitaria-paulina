<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laencasa Ultracongelados</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#b22222;
--primary-dark:#8b1a1a;
--secondary:#f4d03f;
--black:#000;
--white:#fff;
--background:#000;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--background);
color:var(--white);
}

.container{padding:20px 16px 100px;max-width:600px;margin:0 auto;}

header{
position:sticky;top:0;z-index:1000;
background:linear-gradient(135deg,var(--primary),var(--secondary));
padding:10px 12px;
}

.header-content{display:flex;align-items:center;gap:10px;}

.logo-box{
width:60px;height:60px;border-radius:12px;overflow:hidden;background:#fff;
display:flex;align-items:center;justify-content:center;
}

.logo-box img{width:100%;height:100%;object-fit:cover;}

.header-title{font-size:16px;font-weight:700;}
.card{background:#111;padding:16px;margin-bottom:14px;border-radius:16px;}
.flex{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.circle{width:60px;height:60px;border-radius:12px;overflow:hidden;}
.circle img{width:100%;height:100%;object-fit:cover;}

button{border:none;border-radius:12px;font-family:'Poppins';font-weight:600;cursor:pointer;}
.primary{background:var(--primary);color:#fff;height:44px;width:100%;}
.small{height:36px;padding:0 14px;}

input,select{width:100%;padding:12px;margin:8px 0 14px;border-radius:12px;border:none;}
.hidden{display:none;}

#cartBtn{position:fixed;bottom:24px;right:20px;width:64px;height:64px;border-radius:50%;background:var(--secondary);display:flex;justify-content:center;align-items:center;font-size:22px;}
#cartCount{position:absolute;top:-6px;right:-6px;background:red;color:white;width:24px;height:24px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:12px;}

.aviso{background:#222;padding:10px;border-radius:10px;margin-bottom:15px;font-size:12px;border-left:4px solid var(--primary);}
</style>
</head>

<body>

<header>
<div class="header-content">
<div class="logo-box">
<img src="logo.png">
</div>
<div>
<div class="header-title">Laencasa Ultracongelados</div>
</div>
</div>
</header>

<div class="container" id="app"></div>

<div id="cartBtn" onclick="goCart()">🛒<div id="cartCount">0</div></div>

<script>

const RESTAURANTE_END="Rua Evangelina 404 , Vila Carrao Sao Paulo 03421000";
let cart=[];
let viewStack=[];
let dadosPedido={};
let frete=0;

function navigate(fn){viewStack.push(fn);history.pushState({},"");fn();}

const produtos={Marmitas:[{name:"Marmita Frango",price:15,img:"frango.jpg"}]};

function renderHome(){
let html="<h3>Categorias</h3>";
for(let cat in produtos){html+=`<div class="card" onclick="navigate(()=>openCat('${cat}'))">${cat}</div>`;}
document.getElementById("app").innerHTML=html;
}

function openCat(cat){
let html=`<button onclick="history.back()">⬅</button>`;
produtos[cat].forEach((p,i)=>{
html+=`<div class="card flex">
<div>${p.name} - R$ ${p.price}</div>
<button onclick="add('${cat}',${i})">Add</button>
</div>`;
});
document.getElementById("app").innerHTML=html;
}

function add(cat,i){
let item=produtos[cat][i];
let f=cart.find(x=>x.name==item.name);
if(f){f.qty++}else{cart.push({...item,qty:1})}
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText=cart.reduce((s,i)=>s+i.qty,0);
}

function goCart(){navigate(renderCart);}

function renderCart(){
let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
let html="<h3>Carrinho</h3>";
cart.forEach(i=>{
html+=`<div>${i.qty}x ${i.name}</div>`;
});
html+=`<h4>Subtotal: R$ ${subtotal}</h4>`;
html+=`<button onclick="navigate(renderCheckout)">Finalizar</button>`;
document.getElementById("app").innerHTML=html;
}

function renderCheckout(){
let html=`
<h3>Checkout</h3>

<input id="nome" placeholder="Nome">
<input id="fone" placeholder="Telefone">
<input id="endereco" placeholder="Seu endereço">

<select id="pag">
<option>Pix</option>
<option>Cartão</option>
<option>Voucher</option>
</select>

<button onclick="calcularFrete()">Calcular Frete</button>
<div id="freteBox"></div>

<button onclick="finalizar()">Finalizar Pedido</button>
`;

document.getElementById("app").innerHTML=html;
}

async function getCoords(end){
let url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(end)}`;
let res=await fetch(url);
let data=await res.json();
return {lat:data[0].lat,lon:data[0].lon};
}

function distancia(lat1,lon1,lat2,lon2){
let R=6371;
let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;
let a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return R*c;
}

async function calcularFrete(){
let cliente=document.getElementById("endereco").value;

let c1=await getCoords(RESTAURANTE_END);
let c2=await getCoords(cliente);

let km=distancia(c1.lat,c1.lon,c2.lat,c2.lon);

frete=(km*2.5)+3;

document.getElementById("freteBox").innerHTML=`Frete: R$ ${frete.toFixed(2)}`;
}

function finalizar(){
let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
let total=subtotal+frete;

let pag=document.getElementById("pag").value;

let msg=`Pedido%0A Total: R$ ${total}%0A Pagamento: ${pag}`;

if(pag=="Voucher"){
msg+="%0APagamento será realizado na entrega via maquininha";
}

alert(decodeURIComponent(msg));
}

navigate(renderHome);

</script>
</body>
</html>
