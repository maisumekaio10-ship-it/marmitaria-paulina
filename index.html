<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laencasa Ultracongelados</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#8B0000;
--primary-dark:#8b1a1a;
--secondary:#FFD700;
--black:#000;
--white:#fff;
--background:#8B0000;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Inter',sans-serif;
font-weight:500;
background:var(--background);
color:var(--white);
}

.container{padding:20px 16px 100px;max-width:600px;margin:0 auto;}

header{
position:sticky;top:0;z-index:1000;
background:var(--primary);
padding:10px;
}

.logo-box{
width:70px;height:70px;border-radius:12px;overflow:hidden;background:#fff;
margin:10px auto;
display:flex;align-items:center;justify-content:center;
}

.logo-box img{width:100%;height:100%;object-fit:cover;}

.header-title{
text-align:center;
font-size:32px;
font-family:'Bangers',cursive;
letter-spacing:2px;
}

.header-sub{
text-align:center;
font-size:18px;
font-family:'Bebas Neue',sans-serif;
letter-spacing:1.5px;
}

.card{
background:#111;
padding:16px;
margin-bottom:14px;
border-radius:16px;
}

.card b{
font-weight:600;
font-size:16px;
letter-spacing:0.3px;
}

.flex{display:flex;align-items:center;justify-content:space-between;gap:12px;}

button{
border:none;
border-radius:12px;
font-family:'Inter';
font-weight:600;
cursor:pointer;
}

.primary{background:var(--secondary);color:#000;height:44px;width:100%;}
.small{width:auto;height:36px;padding:0 14px;}

input,select{
width:100%;
padding:12px;
margin:8px 0 14px;
border-radius:12px;
border:none;
font-family:'Inter';
font-weight:500;
}

.hidden{display:none;}

.toast{
position:fixed;
bottom:110px;
left:50%;
transform:translateX(-50%);
background:var(--secondary);
color:black;
padding:12px 22px;
border-radius:30px;
display:none;
}

/* GRID KITS */
.grid-kits{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.grid-kits .card{
margin:0;
padding:10px;
text-align:center;
}

.grid-kits img{
width:100%;
border-radius:12px;
margin-bottom:8px;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.modal img{
width:90%;
border-radius:12px;
}

/* CARRINHO */
#cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:var(--secondary);
color:#000;
border-radius:50px;
padding:12px 20px;
font-weight:700;
cursor:pointer;
z-index:9999;
display:flex;
align-items:center;
gap:8px;
}
#cart-btn span{
background:#000;
color:#fff;
padding:2px 6px;
border-radius:50%;
font-size:14px;
}
</style>
</head>

<body>

<header>
<div class="header-title">LAENCASA</div>

<div class="logo-box">
<img src="logo.png">
</div>

<div class="header-sub">
ULTRACONGELADOS • PRATICIDADE • QUALIDADE
</div>
</header>

<div class="container" id="app"></div>

<div class="toast" id="toast">Item adicionado</div>

<div id="cart-btn" onclick="renderCart()" class="hidden">
Carrinho <span id="cart-count">0</span>
</div>

<script>
const TAXA=7;
const RESTAURANTE_END="Rua Evangelina 404 , Vila Carrao Sao Paulo 03421000";

let cart=[];
let viewStack=[];
let dadosPedido={};
let frete=0;

function navigate(fn){viewStack.push(fn);history.pushState({},"");fn();}

window.addEventListener("popstate",function(){
if(viewStack.length>1){viewStack.pop();let last=viewStack[viewStack.length-1];last();}
});

const produtos={
"Marmitas Congeladas":[
{name:"Marmita Frango",price:15,descricao:"Frango grelhado",img:"frango.jpg", oldPrice:18},
{name:"Marmita Carne",price:17,descricao:"Carne assada",img:"carne.jpg", oldPrice:20}
],
"Kit Marmitas Congeladas":[
{name:"Kit 1",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 1",img:"kit1.jpg"},
{name:"Kit 2",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 2",img:"kit2.jpg"},
{name:"Kit 3",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 3",img:"kit3.jpg"},
{name:"Kit 4",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 4",img:"kit4.jpg"},
{name:"Kit 5",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 5",img:"kit5.jpg"},
{name:"Kit 6",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 6",img:"kit6.jpg"},
{name:"Kit 7",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 7",img:"kit7.jpg"},
{name:"Kit 8",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 8",img:"kit8.jpg"},
{name:"Kit 9",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 9",img:"kit9.jpg"},
{name:"Kit 10",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 10",img:"kit10.jpg"},
{name:"Kit 11",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 11",img:"kit11.jpg"},
{name:"Kit 12",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 12",img:"kit12.jpg"},
{name:"Kit 13",price:50,oldPrice:60,descricao:"Conteúdo completo do Kit 13",img:"kit13.jpg"}
]
};

function renderHome(){
let html="<h3>Categorias</h3>";
for(let cat in produtos){
html+=`<div class="card" onclick="navigate(()=>openCat('${cat}'))"><b>${cat}</b></div>`;
}
html+=`
<div style="overflow-x:auto;display:flex;gap:10px;margin-top:20px">
<img src="carrosel1.jpg" style="width:80%;border-radius:12px;">
<img src="carrosel2.jpg" style="width:80%;border-radius:12px;">
<img src="carrosel3.jpg" style="width:80%;border-radius:12px;">
<img src="carrosel4.jpg" style="width:80%;border-radius:12px;">
<img src="carrosel5.jpg" style="width:80%;border-radius:12px;">
<img src="carrosel6.jpg" style="width:80%;border-radius:12px;">
<img src="carrosel7.jpg" style="width:80%;border-radius:12px;">
<img src="carrosel8.jpg" style="width:80%;border-radius:12px;">
<img src="carrosel9.jpg" style="width:80%;border-radius:12px;">
</div>
`;
html+=`
<div style="margin-top:15px;font-size:13px;color:#ccc;text-align:center;line-height:1.4;">
Os kits são previamente definidos e não podem ser alterados ou substituídos.
</div>
`;
html+=`
<div style="margin-top:30px;font-size:12px;text-align:center">
Rua Evangelina 404 - Vila Carrão<br><br>
Comida prática e congelada de qualidade.
</div>`;
document.getElementById("app").innerHTML=html;
updateCartButton();
}

function openCat(cat){
let html=`<button onclick="history.back()">⬅ Voltar</button><h3>${cat}</h3>`;
if(cat==="Kit Marmitas Congeladas"){
html+=`<div class="grid-kits">`;
produtos[cat].forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}" onclick="openModal('${p.img}','${p.descricao}')">
<b>${p.name}</b><br>
R$ <s>${p.oldPrice}</s><br>
<span style="color:#FFD700;font-weight:700;">R$ ${p.price}</span><br><br>
<button class="primary small" onclick="add('${cat}',${i})">+</button>
</div>`;
});
html+=`</div>`;
}else{
produtos[cat].forEach((p,i)=>{
html+=`<div class="card"><div class="flex"><div><b>${p.name}</b><br>R$ ${p.price}</div><button class="primary small" onclick="add('${cat}',${i})">Adicionar</button></div></div>`;
});
}
document.getElementById("app").innerHTML=html;
updateCartButton();
}

function openModal(img,desc){
let modal=document.createElement("div");
modal.className="modal";
modal.onclick=()=>modal.remove();
modal.innerHTML=`<div><img src="${img}"><p style="text-align:center;margin-top:10px;">${desc}</p></div>`;
document.body.appendChild(modal);
}

function openKitDetail(cat,i){
let kit=produtos[cat][i];
let html=`<button onclick="history.back()">⬅ Voltar</button>`;
html+=`<div class="card" style="text-align:center;">
<img src="${kit.img}" style="width:95%;margin-bottom:10px;">
<b>${kit.name}</b><br>
<s>R$ ${kit.oldPrice}</s><br>
<span style="color:#FFD700;font-size:20px;font-weight:700;">R$ ${kit.price}</span>
<p>${kit.descricao}</p>
<button class="primary" onclick="add('${cat}',${i})">Adicionar ao carrinho</button>
</div>`;
document.getElementById("app").innerHTML=html;
updateCartButton();
}

function add(cat,i){
let item=produtos[cat][i];
let f=cart.find(x=>x.name==item.name);
if(f){f.qty++}else{cart.push({...item,qty:1})}
toast();
updateCartButton();
}

function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

function updateCartButton(){
let btn=document.getElementById("cart-btn");
if(cart.length>0){
btn.classList.remove("hidden");
}
document.getElementById("cart-count").innerText=cart.reduce((s,i)=>s+i.qty,0);
}

function renderCart(){
let html="<button onclick='history.back()'>⬅ Voltar</button><h3>Carrinho</h3>";
let subtotal=0;
cart.forEach((i)=>{
subtotal+=i.price*i.qty;
html+=`<div class="card flex"><div>${i.qty}x ${i.name}</div><div>R$ ${(i.price*i.qty).toFixed(2)}</div></div>`;
});
html+=`<h4>Subtotal: R$ ${subtotal.toFixed(2)}</h4>`;
html+=`<button class="primary" onclick="navigate(renderCheckout)">Avançar para Checkout</button>`;
document.getElementById("app").innerHTML=html;
}

function renderCheckout(){
let html=`<button onclick="history.back()">⬅ Voltar</button><h3>Dados do Pedido</h3>
<input id="nome" placeholder="Seu nome">
<input id="fone" placeholder="Telefone">
<select id="tipo" onchange="toggleEndereco()">
<option value="Entrega">Entrega</option>
<option value="Retirada">Retirada</option>
</select>
<div id="enderecoBox">
<input id="cep" placeholder="CEP" onblur="buscarCEP()">
<input id="endereco" placeholder="Rua, número, bairro">
</div>
<label>Pagamento:</label>
<select id="pag">
<option>Pix</option>
<option>Cartão</option>
<option>Voucher</option>
</select>
<div id="freteBox"></div>
<button class="primary" onclick="revisao()">Revisar Pedido</button>`;
document.getElementById("app").innerHTML=html;
}

function toggleEndereco(){
document.getElementById("enderecoBox").classList.toggle("hidden",document.getElementById("tipo").value!="Entrega");
}

async function buscarCEP(){
let cep=document.getElementById("cep").value;
if(cep.length<8) return;
let res=await fetch(`https://viacep.com.br/ws/${cep}/json/`);
let data=await res.json();
if(!data.erro){
document.getElementById("endereco").value =
`${data.logradouro}, ${data.bairro}, ${data.localidade}`;
calcularFrete();
}
}

async function getCoords(end){
let url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(end)}`;
let res=await fetch(url);
let data=await res.json();
return {lat:data[0].lat,lon:data[0].lon};
}

function distancia(lat1,lon1,lat2,lon2){
let R=6371;
let dLat=(lat2-lat1)*Math.PI/180;
let dLon=(lon2-lon1)*Math.PI/180;
let a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return R*c;
}

async function calcularFrete(){
let cliente=document.getElementById("endereco").value;
if(!cliente) return;
let c1=await getCoords(RESTAURANTE_END);
let c2=await getCoords(cliente);
let km=distancia(c1.lat,c1.lon,c2.lat,c2.lon);
frete=(km*2.5)+5;
document.getElementById("freteBox").innerHTML=`Frete: R$ ${frete.toFixed(2)}`;
}

function revisao(){
dadosPedido={
nome:document.getElementById("nome").value,
fone:document.getElementById("fone").value,
tipo:document.getElementById("tipo").value,
endereco:document.getElementById("endereco").value,
pag:document.getElementById("pag").value
};
navigate(renderRevisao);
}

function renderRevisao(){
let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
let total=dadosPedido.tipo=="Entrega"?subtotal+frete:subtotal;
let html="<h3>Confirmar Pedido</h3>";
html+=`Cliente: ${dadosPedido.nome}<br>`;
html+=`Telefone: ${dadosPedido.fone}<br>`;
if(dadosPedido.tipo=="Entrega"){html+=`Endereço: ${dadosPedido.endereco}<br>`;}
cart.forEach(i=>{html+=`${i.qty}x ${i.name}<br>`;});
html+=`<hr>Subtotal: R$ ${subtotal.toFixed(2)}<br>`;
if(dadosPedido.tipo=="Entrega"){html+=`Frete: R$ ${frete.toFixed(2)}<br>`;}
html+=`Total: R$ ${total.toFixed(2)}<br>`;
html+=`Pagamento: ${dadosPedido.pag}<br>`;
html+=`<button class="primary" onclick="finalizar()">Enviar Pedido</button>`;
document.getElementById("app").innerHTML=html;
updateCartButton();
}

function finalizar(){
let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
let total=dadosPedido.tipo=="Entrega"?subtotal+frete:subtotal;
let msg="*Pedido - Laencasa Ultracongelados*%0A%0A";
msg+=`Nome: ${dadosPedido.nome}%0A`;
msg+=`Telefone: ${dadosPedido.fone}%0A`;
if(dadosPedido.tipo=="Entrega"){msg+=`Endereço: ${dadosPedido.endereco}%0A`;}
msg+="%0AItens:%0A";
cart.forEach(i=>{msg+=`${i.qty}x ${i.name}%0A`;});
msg+=`%0ASubtotal: R$ ${subtotal.toFixed(2)}%0A`;
if(dadosPedido.tipo=="Entrega"){msg+=`Frete: R$ ${frete.toFixed(2)}%0A`;}
msg+=`Total: R$ ${total.toFixed(2)}%0A`;
msg+=`Pagamento: ${dadosPedido.pag}%0A`;
window.open(`https://wa.me/5511952282056?text=${msg}`);
}

navigate(renderHome);
</script>
</body>
</html>
