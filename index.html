    <style>
        :root {
            /* VOLTANDO PARA O VERMELHO ORIGINAL */
            --primary: #8B0000;
            --primary-dark: #660000;
            --secondary: #FFD700; /* AMARELO VIBRANTE */
            --black: #000;
            --white: #fff;
            --background: #8B0000; /* FUNDO VERMELHO */
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            background: var(--background);
            color: var(--white);
        }

        .container {
            padding: 20px 16px 100px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* HEADER AJUSTADO PARA VERMELHO E AMARELO */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--primary);
            padding: 15px;
            border-bottom: 2px solid var(--secondary);
            text-align: center;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--secondary);
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-title {
            text-align: center;
            font-size: 42px;
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            color: var(--secondary); /* NOME EM AMARELO */
            text-shadow: 2px 2px 0px #000;
        }

        .header-sub {
            text-align: center;
            font-size: 16px;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1.5px;
            color: #eee;
        }

        /* BANNER DE CHAMADA PROFISSIONAL (MANTIDO EM AMARELO) */
        .cta-banner {
            background: var(--secondary);
            color: #000;
            padding: 12px;
            text-align: center;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .card {
            background: #111; /* CARD ESCURO PARA CONTRASTE */
            padding: 16px;
            margin-bottom: 14px;
            border-radius: 16px;
            border: 1px solid #333;
        }

        .card b { font-weight: 600; font-size: 16px; }

        .flex { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

        button {
            border: none;
            border-radius: 12px;
            font-family: 'Inter';
            font-weight: 600;
            cursor: pointer;
        }

        .primary { background: var(--secondary); color: #000; height: 44px; width: 100%; }
        .small { width: auto; height: 36px; padding: 0 14px; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0 14px;
            border-radius: 12px;
            border: none;
            background: #222;
            color: #fff;
            font-family: 'Inter';
        }

        .hidden { display: none; }

        .grid-kits {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .grid-kits .card { margin: 0; padding: 10px; text-align: center; }
        .grid-kits img { width: 100%; border-radius: 12px; margin-bottom: 8px; }

        .search-input { margin-bottom: 15px; border: 2px solid var(--secondary); }

        /* BOTÃO DO CARRINHO (MANTIDO EM AMARELO) */
        #cart-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--secondary);
            color: #000;
            border-radius: 50px;
            padding: 15px 25px;
            font-weight: 800;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* CARROSSEL AJUSTADO */
        #carousel-container {
            overflow-x: auto;
            display: flex;
            gap: 10px;
            margin-top: 20px;
            scroll-behavior: smooth;
            cursor: pointer;
            scrollbar-width: none;
        }
        #carousel-container::-webkit-scrollbar { display: none; }
        #carousel-container img { width: 85%; flex-shrink: 0; border-radius: 12px; border: 1px solid #333; }
    </style>
</head>

        function startCarousel() {
            if (carouselTimer) clearInterval(carouselTimer);
            const container = document.getElementById('carousel-container');
            if (!container) return;

            carouselTimer = setInterval(() => {
                const scrollAmount = container.offsetWidth * 0.8;
                if (container.scrollLeft + container.offsetWidth >= container.scrollWidth - 10) {
                    container.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                }
            }, 2500); 
        }

        function openCat(cat) {

        function filterProducts(cat) {
            let val = document.getElementById("searchInput").value.toLowerCase();
            let items = document.getElementsByClassName("product-item");

                html += `<button class="primary" onclick="navigate(renderCheckout)">Checkout</button>`;

        function toggleEndereco() {
            document.getElementById("enderecoBox").classList.toggle("hidden", document.getElementById("tipo").value != "Entrega");

        async function buscarCEP() {
            let cep = document.getElementById("cep").value;
            if (cep.length < 8) return;
            try {
                let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                let data = await res.json();
                if (!data.erro) {
                    document.getElementById("endereco").value = `${data.logradouro}, ${data.bairro}`;
                    calcularFrete();
                }
            } catch (e) {}
        }

        async function getCoords(end) {
            try {
                let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(end)}`;
                let res = await fetch(url);
                let data = await res.json();
                return data && data[0] ? { lat: data[0].lat, lon: data[0].lon } : null;
            } catch(e) { return null; }
        }

        function distancia(lat1, lon1, lat2, lon2) {
            let R = 6371;
            let dLat = (lat2 - lat1) * Math.PI / 180;
            let dLon = (lon2 - lon1) * Math.PI / 180;
            let a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

            let cliente = document.getElementById("endereco").value;
            if (!cliente) return;
            document.getElementById("freteBox").innerHTML = "Calculando...";
            let c1 = await getCoords(RESTAURANTE_END);
            let c2 = await getCoords(cliente);
            if (c1 && c2) {
                let km = distancia(c1.lat, c1.lon, c2.lat, c2.lon);
                frete = Math.max(7, (km * 2.5) + 5);
            } else { frete = 10; }
            document.getElementById("freteBox").innerHTML = `Frete: R$ ${frete.toFixed(2)}`;
        }

        function revisao() {
            dadosPedido = {
                nome: document.getElementById("nome").value,
                fone: document.getElementById("fone").value,
                tipo: document.getElementById("tipo").value,
                endereco: document.getElementById("endereco").value,
                num: document.getElementById("num").value,
                pag: document.getElementById("pag").value
            };
            navigate(renderRevisao);
        }

        function renderRevisao() {
            let subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            let total = dadosPedido.tipo == "Entrega" ? subtotal + frete : subtotal;
            let html = "<h3>Confirmar</h3>";
            cart.forEach(i => { html += `${i.qty}x ${i.name}<br>`; });
            html += `<hr>Total: R$ ${total.toFixed(2)}<br>`;
            html += `<button class="primary" onclick="finalizar()">Enviar p/ WhatsApp</button>`;
            document.getElementById("app").innerHTML = html;
        }

        function finalizar() {
            let subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            let total = dadosPedido.tipo == "Entrega" ? subtotal + frete : subtotal;
            let msg = `*Pedido - Laencasa*%0A%0ACliente: ${dadosPedido.nome}%0A`;
            cart.forEach(i => { msg += `${i.qty}x ${i.name}%0A`; });
            msg += `%0ATotal: R$ ${total.toFixed(2)}%0APagamento: ${dadosPedido.pag}`;
            window.open(`https://wa.me/5511952282056?text=${msg}`);
        }

        navigate(renderHome);
    </script>
</body>
</html>
