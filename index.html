<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulina Marmitex</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2}
header{background:#d62828;color:white;padding:15px;text-align:center;font-size:20px}
.container{padding:15px}
.categoria{background:white;padding:10px;margin-bottom:15px;border-radius:8px}
.produto{display:flex;align-items:center;justify-content:space-between;margin:8px 0}
.produto img{width:55px;height:55px;border-radius:8px;object-fit:cover;margin-right:10px}
button{background:#d62828;color:white;border:none;padding:7px 10px;border-radius:5px}
#carrinho{background:white;padding:10px;border-radius:8px}
.finalizar{background:green;width:100%;margin-top:10px}
input,select{width:100%;padding:7px;margin-top:5px;margin-bottom:10px}
</style>
</head>

<body>

<header>Paulina Marmitex</header>

<div class="container">
<div id="produtos"></div>

<div id="carrinho">
<h3>Seu Pedido</h3>
<div id="lista"></div>
<p><strong>Total: R$ <span id="total">0</span></strong></p>

<label>Agendar Pedido</label>
<input type="datetime-local" id="agendamento">

<label>Forma de Pagamento</label>
<select id="pagamento">
<option value="Pix">Pix</option>
<option value="Dinheiro">Dinheiro</option>
</select>

<div id="trocoDiv" style="display:none;">
Troco para quanto?
<input type="number" id="troco">
</div>

<button class="finalizar" onclick="finalizarPedido()">Finalizar Pedido</button>
</div>
</div>

<script>

// BLOQUEIO REAL DO BOTÃO VOLTAR
function bloquearVoltar(){
history.pushState({page:1},"","");
history.pushState({page:2},"","");

window.addEventListener("popstate",function(){
if(confirm("Seu pedido pode ser perdido. Deseja realmente sair?")){
history.go(-2);
}else{
history.pushState({page:2},"","");
}
});
}
bloquearVoltar();

const numero="5512988721307";
let carrinho=[];

const categorias={
"Marmitas":[
{name:"Frango",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/6/60/Chicken_and_rice.jpg"},
{name:"Carne",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Beef_rice.jpg"},
{name:"Linguiça",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/3/39/Sausage_with_rice.jpg"},
{name:"Strogonoff",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/4/4f/Stroganoff.jpg"},
{name:"Feijoada",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/6/63/Feijoada.jpg"},
{name:"Vegetariana",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/1/15/Vegetarian_plate.jpg"},
{name:"Especial",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/2/2e/Rice_and_beans.jpg"}
],
"Bebidas":[
{name:"Guaraná",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/5/57/Guarana_antarctica.jpg"},
{name:"Coca-Cola",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/7/70/Coca-Cola_Classic_glass_bottle.jpg"},
{name:"Suco Laranja",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/c/c4/Orange_juice_1.jpg"},
{name:"Suco Uva",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/3/36/Grape_juice.jpg"},
{name:"Água",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/1/14/Bottled_water.jpg"},
{name:"Refrigerante Lata",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Soda_can.jpg"},
{name:"Chá Gelado",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/6/62/Iced_tea.jpg"}
],
"Doces":[
{name:"Brigadeiro",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/9/9a/Brigadeiro.jpg"},
{name:"Pudim",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/2/2d/Pudim.jpg"},
{name:"Mousse",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/4/49/Chocolate_mousse.jpg"},
{name:"Bolo Chocolate",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/7/7b/Chocolate_cake.jpg"},
{name:"Bolo Cenoura",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/0/05/Carrot_cake.jpg"},
{name:"Gelatina",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/2/24/Gelatin_dessert.jpg"},
{name:"Doce de Leite",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/6/6b/Dulce_de_leche.jpg"}
],
"Acompanhamentos":[
{name:"Farofa",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/4/45/Farofa.jpg"},
{name:"Vinagrete",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/1/19/Vinaigrette.jpg"},
{name:"Arroz Extra",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/6/60/White_rice.jpg"},
{name:"Feijão Extra",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/6/63/Black_beans.jpg"},
{name:"Batata Frita",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/6/66/French_fries.jpg"},
{name:"Purê",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/4/4f/Mashed_potatoes.jpg"},
{name:"Salada",preco:7,img:"https://upload.wikimedia.org/wikipedia/commons/a/ac/Salad.jpg"}
]
};

const produtosDiv=document.getElementById("produtos");

for(let cat in categorias){
let div=document.createElement("div");
div.className="categoria";
div.innerHTML="<h3>"+cat+"</h3>";
categorias[cat].forEach(p=>{
div.innerHTML+=`
<div class="produto">
<div style="display:flex;align-items:center">
<img src="${p.img}">
<span>${p.name} - R$ ${p.preco}</span>
</div>
<button onclick="adicionar('${p.name}',${p.preco})">Adicionar</button>
</div>`;
});
produtosDiv.appendChild(div);
}

function adicionar(nome,preco){
carrinho.push({nome,preco});
atualizar();
}

function atualizar(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let total=0;
carrinho.forEach(p=>{
lista.innerHTML+=`<p>${p.nome} - R$ ${p.preco}</p>`;
total+=p.preco;
});
document.getElementById("total").innerText=total;
}

document.getElementById("pagamento").addEventListener("change",function(){
document.getElementById("trocoDiv").style.display=this.value==="Dinheiro"?"block":"none";
});

function finalizarPedido(){
if(carrinho.length===0){
alert("Adicione itens ao carrinho.");
return;
}

let total=document.getElementById("total").innerText;
let pagamento=document.getElementById("pagamento").value;
let agendamento=document.getElementById("agendamento").value;
let troco=document.getElementById("troco").value;

let mensagem="NOVO PEDIDO - Paulina Marmitex\n\n";

carrinho.forEach(p=>{
mensagem+=p.nome+" - R$ "+p.preco+"\n";
});

mensagem+="\nTotal: R$ "+total+"\n";
mensagem+="Pagamento: "+pagamento+"\n";

if(pagamento==="Dinheiro" && troco){
mensagem+="Troco para: R$ "+troco+"\n";
}

if(agendamento){
mensagem+="Agendado para: "+agendamento+"\n";
}else{
mensagem+="Entrega: Imediata\n";
}

if(pagamento==="Pix"){
mensagem+="\nAguardando envio do comprovante.";
}

let url="https://wa.me/"+numero+"?text="+encodeURIComponent(mensagem);
window.location.href=url;
}

</script>

</body>
</html>
