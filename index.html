<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulina Marmitex</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#8B0000;color:#fff;padding:15px;text-align:center;font-weight:bold}
.container{padding:15px;padding-bottom:90px}
h3{margin-top:0}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
button{padding:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.primary{background:#8B0000;color:#fff;width:100%}
.small{padding:5px 10px;font-size:14px}
input,select{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc}
.hidden{display:none}
.flex{display:flex;align-items:center;justify-content:space-between}

.circle{
width:40px;
height:40px;
min-width:40px;
min-height:40px;
flex-shrink:0;
border-radius:50%;
border:2px solid orange;
display:flex;
align-items:center;
justify-content:center;
margin-right:10px;
overflow:hidden;
background:#fff;
font-size:18px;
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

#cartBtn{
position:fixed;bottom:20px;right:20px;
background:#8B0000;color:white;
width:60px;height:60px;border-radius:50%;
display:flex;justify-content:center;align-items:center;
font-size:20px;box-shadow:0 4px 10px rgba(0,0,0,.3);
cursor:pointer}

#cartCount{
position:absolute;top:-5px;right:-5px;
background:#fff;color:#8B0000;
width:22px;height:22px;border-radius:50%;
font-size:13px;display:flex;justify-content:center;align-items:center}

.toast{
position:fixed;bottom:90px;left:50%;
transform:translateX(-50%);
background:#4CAF50;color:white;
padding:10px 20px;border-radius:20px;
display:none}
</style>
</head>
<body>

<header>
Paulina Marmitex<br>
<small>Tradição e Sabor Caseiro</small>
</header>

<div class="container" id="app"></div>

<div id="cartBtn" onclick="goCart()">
🛒
<div id="cartCount">0</div>
</div>

<div class="toast" id="toast">Item adicionado</div>

<script>

const TAXA = 7;
let cart=[];
let viewStack=[];

function navigate(fn){
viewStack.push(fn);
history.pushState({},"");
fn();
}

window.addEventListener("popstate",function(){
if(viewStack.length>1){
viewStack.pop();
let last=viewStack[viewStack.length-1];
last();
}else{
history.pushState({},"");
}
});

const produtos={
Marmitas:[
{name:"Marmita Frango Grelhado",price:18},
{name:"Marmita Carne Acebolada",price:20},
{name:"Marmita Feijoada",price:22},
{name:"Marmita Strogonoff",price:21},
{name:"Marmita Fitness",price:23},
{name:"Marmita Vegetariana",price:19},
{name:"Marmita Costela",price:24}
],
Bebidas:[
{name:"Coca-Cola 2L",price:12},
{name:"Guaraná 2L",price:10},
{name:"Suco Natural",price:7},
{name:"Água Mineral",price:3},
{name:"Fanta Laranja",price:9},
{name:"Refrigerante Lata",price:5},
{name:"Suco Detox",price:8}
],
Doces:[
{name:"Pudim",price:6},
{name:"Mousse Chocolate",price:6},
{name:"Brigadeiro",price:3},
{name:"Beijinho",price:3},
{name:"Torta Limão",price:7},
{name:"Bolo Caseiro",price:5},
{name:"Geladinho Gourmet",price:4}
],
Acompanhamentos:[
{name:"Farofa",price:4},
{name:"Vinagrete",price:4},
{name:"Arroz Extra",price:5},
{name:"Feijão Extra",price:5},
{name:"Batata Frita",price:8},
{name:"Salada",price:6},
{name:"Torresmo",price:9}
]
};

function renderHome(){
let html="<h3>Categorias</h3>";

for(let cat in produtos){

let emoji="🍽️";
if(cat=="Marmitas") emoji="🍛";
if(cat=="Bebidas") emoji="🥤";
if(cat=="Doces") emoji="🍰";
if(cat=="Acompanhamentos") emoji="🍟";

html+=`
<div class="card" onclick="navigate(()=>openCat('${cat}'))">
<div class="flex">
<div class="flex">
<div class="circle">${emoji}</div>
<b>${cat}</b>
</div>
</div>
</div>`;
}

document.getElementById("app").innerHTML=html;
}

function openCat(cat){
let html=`<button onclick="history.back()">⬅ Voltar</button><h3>${cat}</h3>`;

produtos[cat].forEach((p,i)=>{
html+=`
<div class="card">
<div class="flex">
<div class="flex">
<div class="circle">
<img src="https://source.unsplash.com/100x100/?food">
</div>
<div>
<b>${p.name}</b><br>
R$ ${p.price.toFixed(2)}
</div>
</div>
<button class="primary small" onclick="add('${cat}',${i})">Adicionar</button>
</div>
</div>`;
});

document.getElementById("app").innerHTML=html;
}

function add(cat,i){
let item=produtos[cat][i];
let f=cart.find(x=>x.name==item.name);
if(f){f.qty++}else{cart.push({...item,qty:1})}
updateCart();
toast();
}

function updateCart(){
document.getElementById("cartCount").innerText=
cart.reduce((s,i)=>s+i.qty,0);
}

function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

function goCart(){ navigate(renderCart); }

function renderCart(){
let html="<button onclick='history.back()'>⬅ Voltar</button><h3>Carrinho</h3>";
let subtotal=0;

cart.forEach(i=>{
subtotal+=i.price*i.qty;
html+=`<div class="card flex">
<div>${i.qty}x ${i.name}</div>
<div>R$ ${(i.price*i.qty).toFixed(2)}</div>
</div>`;
});

html+=`<h4>Subtotal: R$ ${subtotal.toFixed(2)}</h4>
<button class="primary" onclick="navigate(renderCheckout)">Continuar</button>`;

document.getElementById("app").innerHTML=html;
}

function renderCheckout(){
let html=`
<button onclick="history.back()">⬅ Voltar</button>
<h3>Dados do Pedido</h3>
<input id="nome" placeholder="Seu nome">
<input id="fone" placeholder="Telefone">
<div style="margin-top:10px;">
  <label> Endereço de Entrega</label>
  <input type="text" id="endereco" placeholder="Rua, número, bairro"
  style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;">
</div>
<label>Tipo:</label>
<select id="tipo">
<option value="Entrega">Entrega (+7)</option>
<option value="Retirada">Retirada</option>
</select>

<label>Quando?</label>
<select id="quando" onchange="toggleData()">
<option value="Agora">Agora</option>
<option value="Agendar">Agendar</option>
</select>

<div id="dataBox" class="hidden">
<input type="datetime-local" id="data">
</div>

<label>Pagamento:</label>
<select id="pag" onchange="toggleTroco()">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<div id="trocoBox" class="hidden">
<input id="troco" placeholder="Troco para quanto?">
</div>

<button class="primary" onclick="revisao()">Revisar Pedido</button>
`;

document.getElementById("app").innerHTML=html;
}

function toggleData(){
document.getElementById("dataBox").classList.toggle("hidden",
document.getElementById("quando").value!="Agendar");
}

function toggleTroco(){
document.getElementById("trocoBox").classList.toggle("hidden",
document.getElementById("pag").value!="Dinheiro");
}

let tipo=window.dadosCliente?.tipo || "Entrega";
let pag=window.dadosCliente?.pag || "Pix";
let quando=window.dadosCliente?.quando || "Agora";
let data=window.dadosCliente?.data || "";
let troco=window.dadosCliente?.troco || "";

navigate(renderRevisao);
}

function renderRevisao(){
let tipo=document.getElementById("tipo")?.value||"Entrega";
let pag=document.getElementById("pag")?.value||"Pix";
let quando=document.getElementById("quando")?.value||"Agora";
let data=document.getElementById("data")?.value||"";
let troco=document.getElementById("troco")?.value||"";
let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
let total=tipo=="Entrega"?subtotal+TAXA:subtotal;

let html="<button onclick='history.back()'>⬅ Voltar</button>";
html+="<h3>Confirmar Pedido</h3>";

cart.forEach(i=>{
html+=`<div>${i.qty}x ${i.name}</div>`;
});

html+=`
<hr>
Subtotal: R$ ${subtotal.toFixed(2)}<br>
Total: R$ ${total.toFixed(2)}<br>
Pagamento: ${pag}<br>
<button class="primary" onclick="finalizar()">Confirmar e Enviar</button>
`;

document.getElementById("app").innerHTML=html;
}

function finalizar(){

let nome=window.dadosCliente?.nome || "Não informado";
let fone=window.dadosCliente?.fone || "Não informado";
let endereco=window.dadosCliente?.endereco || "Não informado";
let tipo=window.dadosCliente?.tipo || "Entrega";
let pag=window.dadosCliente?.pag || "Pix";
let quando=window.dadosCliente?.quando || "Agora";
let data=window.dadosCliente?.data || "";
let troco=window.dadosCliente?.troco || "";
let tipo=document.getElementById("tipo")?.value||"Entrega";
let pag=document.getElementById("pag")?.value||"Pix";
let quando=document.getElementById("quando")?.value||"Agora";
let data=document.getElementById("data")?.value||"";
let troco=document.getElementById("troco")?.value||"";

let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
let total=tipo=="Entrega"?subtotal+TAXA:subtotal;

let msg="*🍽️ PEDIDO - PAULINA MARMITEX 🍽️*%0A%0A";

msg+=`👤 *Cliente:* ${nome}%0A`;
msg+=`📞 *Telefone:* ${fone}%0A`;
msg+=`📍 *Endereço:* ${endereco}%0A%0A`;

msg+="🛒 *ITENS DO PEDIDO:*%0A";

cart.forEach(i=>{
msg+=`• ${i.qty}x ${i.name} - R$ ${(i.price*i.qty).toFixed(2)}%0A`;
});

msg+=`%0A💰 *Resumo:*%0A`;
msg+=`Subtotal: R$ ${subtotal.toFixed(2)}%0A`;

if(tipo=="Entrega"){
msg+=`🚚 Taxa de Entrega: R$ ${TAXA.toFixed(2)}%0A`;
}

msg+=`💵 *Total: R$ ${total.toFixed(2)}*%0A%0A`;

msg+=`📦 *Tipo:* ${tipo}%0A`;

if(quando=="Agendar" && data){
msg+=`⏰ *Agendado para:* ${data}%0A`;
}else{
msg+=`⚡ *Pedido para:* Agora%0A`;
}

msg+=`%0A💳 *Pagamento:* ${pag}%0A`;

if(pag=="Dinheiro"){
if(troco){
msg+=`💵 Troco para: R$ ${troco}%0A`;
}else{
msg+=`💵 Pagamento em dinheiro (sem troco informado)%0A`;
}
}

if(pag=="Pix"){
msg+=`📲 Pix - Enviar comprovante após pagamento.%0A`;
}

if(pag=="Cartão"){
msg+=`💳 Cartão na entrega (levar maquininha).%0A`;
}

msg+="%0A%0A🙏 Obrigado pela preferência!";
msg+="%0A🚚 Entrega estimada: 30 a 45 minutos.";

window.open(`https://wa.me/5512988721307?text=${msg}`);
}

navigate(renderHome);

</script>
</body>
</html>
