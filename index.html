<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulina Marmitex</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#8B0000;color:#fff;padding:15px;text-align:center;font-weight:bold}
.container{padding:15px;padding-bottom:90px}
h3{margin-top:0}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
button{padding:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.primary{background:#8B0000;color:#fff;width:100%}
.small{padding:5px 10px;font-size:14px}
input,select{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc}
.hidden{display:none}
.flex{display:flex;justify-content:space-between;align-items:center}

.logoCircle{
width:60px;
height:60px;
border-radius:50%;
background:#8B0000;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 2px 6px rgba(0,0,0,.2);
}

.logoCircle img{
width:35px;
height:35px;
object-fit:contain;
}

#cartBtn{
position:fixed;bottom:20px;right:20px;
background:#8B0000;color:white;
width:60px;height:60px;border-radius:50%;
display:flex;justify-content:center;align-items:center;
font-size:20px;box-shadow:0 4px 10px rgba(0,0,0,.3);
cursor:pointer}

#cartCount{
position:absolute;top:-5px;right:-5px;
background:#fff;color:#8B0000;
width:22px;height:22px;border-radius:50%;
font-size:13px;display:flex;justify-content:center;align-items:center}

.toast{
position:fixed;bottom:90px;left:50%;
transform:translateX(-50%);
background:#4CAF50;color:white;
padding:10px 20px;border-radius:20px;
display:none}
</style>
</head>

<body>

<header>
Paulina Marmitex<br>
<small>Tradição e Sabor Caseiro</small>
</header>

<div class="container" id="app"></div>

<div id="cartBtn" onclick="goCart()">
🛒
<div id="cartCount">0</div>
</div>

<div class="toast" id="toast">Item adicionado</div>

<script>

const TAXA = 7;
let cart=[];
let currentView="home";

const produtos={
Marmitas:[
{name:"Marmita Frango Grelhado",price:18},
{name:"Marmita Carne Acebolada",price:20},
{name:"Marmita Feijoada",price:22}
],
Bebidas:[
{name:"Coca-Cola 2L",price:12},
{name:"Guaraná 2L",price:10}
],
Doces:[
{name:"Pudim",price:6},
{name:"Mousse Chocolate",price:6}
],
Acompanhamentos:[
{name:"Farofa",price:4},
{name:"Vinagrete",price:4}
]
};

function renderHome(){
currentView="home";
history.pushState({page:"home"},"");

let html="<h3>Categorias</h3>";

for(let cat in produtos){
html+=`
<div class="card" onclick="openCat('${cat}')">
<div style="display:flex;align-items:center;gap:15px;">
<div class="logoCircle">
<img src="logo.png">
</div>
<b>${cat}</b>
</div>
</div>`;
}

document.getElementById("app").innerHTML=html;
}

function openCat(cat){
currentView="cat";
history.pushState({page:"cat"},"");

let html=`<button onclick="renderHome()">⬅ Voltar</button><h3>${cat}</h3>`;

produtos[cat].forEach((p,i)=>{
html+=`<div class="card">
<div class="flex">
<div>
<b>${p.name}</b><br>
R$ ${p.price.toFixed(2)}
</div>
<button class="primary small" onclick="add('${cat}',${i})">Adicionar</button>
</div>
</div>`;
});

document.getElementById("app").innerHTML=html;
}

function add(cat,i){
let item=produtos[cat][i];
let f=cart.find(x=>x.name==item.name);
if(f){f.qty++}else{cart.push({...item,qty:1})}
updateCart();
toast();
}

function updateCart(){
document.getElementById("cartCount").innerText=
cart.reduce((s,i)=>s+i.qty,0);
}

function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

function goCart(){
currentView="cart";
history.pushState({page:"cart"},"");

let html="<button onclick='renderHome()'>⬅ Voltar</button><h3>Carrinho</h3>";
let subtotal=0;

cart.forEach((i)=>{
subtotal+=i.price*i.qty;
html+=`<div class="card flex">
<div>${i.qty}x ${i.name}</div>
<div>R$ ${(i.price*i.qty).toFixed(2)}</div>
</div>`;
});

html+=`<h4>Subtotal: R$ ${subtotal.toFixed(2)}</h4>
<button class="primary" onclick="checkout()">Continuar</button>`;

document.getElementById("app").innerHTML=html;
}

function checkout(){
currentView="checkout";
history.pushState({page:"checkout"},"");

let html=`<h3>Dados do Pedido</h3>
<input id="nome" placeholder="Seu nome">
<input id="fone" placeholder="Telefone">
<select id="tipo">
<option value="Entrega">Entrega (+7)</option>
<option value="Retirada">Retirada</option>
</select>
<select id="pag">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>
<button class="primary" onclick="revisao()">Revisar Pedido</button>`;

document.getElementById("app").innerHTML=html;
}

function revisao(){
currentView="rev";
history.pushState({page:"rev"},"");

let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
let total=document.getElementById("tipo").value=="Entrega"?subtotal+TAXA:subtotal;

let html="<h3>Confirmar Pedido</h3>";

cart.forEach(i=>{
html+=`<div>${i.qty}x ${i.name}</div>`;
});

html+=`<hr>Total: R$ ${total.toFixed(2)}<br>
<button class="primary" onclick="finalizar()">Confirmar e Enviar</button>`;

document.getElementById("app").innerHTML=html;
}

function finalizar(){

let tipo=document.getElementById("tipo").value;
let pag=document.getElementById("pag").value;
let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
let total=tipo=="Entrega"?subtotal+TAXA:subtotal;

let msg="*Pedido - Paulina Marmitex*%0A%0A";

cart.forEach(i=>{
msg+=`${i.qty}x ${i.name} - R$${(i.price*i.qty).toFixed(2)}%0A`;
});

msg+=`%0ATotal: R$${total.toFixed(2)}%0A`;
msg+=`Tipo: ${tipo}%0A`;
msg+=`Pagamento: ${pag}%0A`;

window.location.href = `https://wa.me/5512988721307?text=${msg}`;
}

window.onpopstate=function(){

if(currentView==="home"){
let sair=confirm("Deseja realmente sair do cardápio da Paulina Marmitex?");
if(!sair){
history.pushState({page:"home"},"");
}
}else{
renderHome();
}

};

renderHome();

</script>
</body>
</html>
