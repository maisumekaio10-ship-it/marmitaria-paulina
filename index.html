<!DOCTYPE html> 
<html lang="pt-br"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Paulina Marmitex</title>  

<style> 
body{margin:0;font-family:Arial;background:#dcdcdc} 
header{background:#f4a261;color:#ffffff;padding:15px;text-align:center;font-weight:bold} 
header img{width:120px;display:block;margin:0 auto 10px auto} 
.container{padding:15px;padding-bottom:90px} 
h3{margin-top:0;color:#f4a261} 
.card{background:#ffffff;padding:12px;margin:10px 0;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.1)} 
button{padding:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer} 
.primary{background:#f4a261;color:#ffffff;width:100%} 
.small{padding:5px 10px;font-size:14px} 
input,select{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc} 
.hidden{display:none} 
.flex{display:flex;align-items:center;justify-content:space-between}  

.circle{ 
width:40px; 
height:40px; 
min-width:40px; 
min-height:40px; 
flex-shrink:0; 
border-radius:50%; 
border:2px solid #f4a261; 
display:flex; 
align-items:center; 
justify-content:center; 
margin-right:10px; 
overflow:hidden; 
background:#fff; 
font-size:18px; 
}  

.circle img{ 
width:100%; 
height:100%; 
object-fit:cover; 
border-radius:50%; 
}  

#cartBtn{ 
position:fixed;bottom:20px;right:20px; 
background:#f4a261;color:white; 
width:60px;height:60px;border-radius:50%; 
display:flex;justify-content:center;align-items:center; 
font-size:20px;box-shadow:0 4px 10px rgba(0,0,0,.3); 
cursor:pointer}  

#cartCount{ 
position:absolute;top:-5px;right:-5px; 
background:#ffffff;color:#f4a261; 
width:22px;height:22px;border-radius:50%; 
font-size:13px;display:flex;justify-content:center;align-items:center}  

.toast{ 
position:fixed;bottom:90px;left:50%; 
transform:translateX(-50%); 
background:#f4a261;color:white; 
padding:10px 20px;border-radius:20px; 
display:none} 
</style> 
</head> 

<body>  

<header> 
<img src="https://i.imgur.com/yourlogo.png"> 
Paulina Marmitex<br> 
<small>Tradição e Sabor Caseiro</small> 
</header>  

<div class="container" id="app"></div>  

<div id="cartBtn" onclick="goCart()"> 🛒 
<div id="cartCount">0</div> 
</div>  

<div class="toast" id="toast">Item adicionado</div>  

<script>  

const TAXA = 7; 
let cart=[]; 
let viewStack=[]; 
let dadosPedido={};  

function navigate(fn){ 
viewStack.push(fn); 
history.pushState({},""); 
fn(); 
}  

window.addEventListener("popstate",function(){ 
if(viewStack.length>1){ 
viewStack.pop(); 
let last=viewStack[viewStack.length-1]; 
last(); 
}else{ 
history.pushState({},""); 
} 
});  

const produtos={ 
Marmitas:[ 
{name:"Marmita Frango Grelhado",price:18,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?w=200"}, 
{name:"Marmita Carne Acebolada",price:20,img:"https://images.unsplash.com/photo-1551218808-94e220e084d2?w=200"}, 
{name:"Marmita Feijoada",price:22,img:"https://images.unsplash.com/photo-1625943555419-56a2cb596640?w=200"}, 
{name:"Marmita Strogonoff",price:21,img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092?w=200"}, 
{name:"Marmita Fitness",price:23,img:"https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200"}, 
{name:"Marmita Vegetariana",price:19,img:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=200"}, 
{name:"Marmita Costela",price:24,img:"https://images.unsplash.com/photo-1555992336-03a23c7b20ee?w=200"} 
], 
Bebidas:[ 
{name:"Coca-Cola 2L",price:12,img:"https://images.unsplash.com/photo-1581636625402-29b2a704ef13?w=200"}, 
{name:"Guaraná 2L",price:10,img:"https://images.unsplash.com/photo-1598514982201-5f1c4a7b6f26?w=200"}, 
{name:"Suco Natural",price:7,img:"https://images.unsplash.com/photo-1553530666-ba11a7da3888?w=200"}, 
{name:"Água Mineral",price:3,img:"https://images.unsplash.com/photo-1561047029-3000c68339ca?w=200"}, 
{name:"Fanta Laranja",price:9,img:"https://images.unsplash.com/photo-1589927986089-35812388d1f4?w=200"}, 
{name:"Refrigerante Lata",price:5,img:"https://images.unsplash.com/photo-1592750475338-74b7b21085ab?w=200"}, 
{name:"Suco Detox",price:8,img:"https://images.unsplash.com/photo-1577801592642-86f3f9f8f8c2?w=200"} 
] 
};  

function renderHome(){ 
let html="<h3>Categorias</h3>"; 
for(let cat in produtos){ 
html+=`<div class="card" onclick="navigate(()=>openCat('${cat}'))">
<div class="flex">
<div class="flex">
<div class="circle">🍽️</div>
<b>${cat}</b>
</div>
</div>
</div>`; 
} 
document.getElementById("app").innerHTML=html; 
}  

function openCat(cat){ 
let html=`<button onclick="history.back()">⬅ Voltar</button><h3>${cat}</h3>`; 
produtos[cat].forEach((p,i)=>{ 
html+=`<div class="card">
<div class="flex">
<div class="flex">
<div class="circle">
<img src="${p.img}">
</div>
<div>
<b>${p.name}</b><br>
R$ ${p.price.toFixed(2)}
</div>
</div>
<button class="primary small" onclick="add('${cat}',${i})">Adicionar</button>
</div>
</div>`; 
}); 
document.getElementById("app").innerHTML=html; 
}  

function add(cat,i){ 
let item=produtos[cat][i]; 
let f=cart.find(x=>x.name==item.name); 
if(f){f.qty++}else{cart.push({...item,qty:1})} 
updateCart(); 
toast(); 
}  

function updateCart(){ 
document.getElementById("cartCount").innerText= 
cart.reduce((s,i)=>s+i.qty,0); 
}  

function toast(){ 
let t=document.getElementById("toast"); 
t.style.display="block"; 
setTimeout(()=>t.style.display="none",1500); 
}  

function goCart(){ 
navigate(renderCart); 
}  

navigate(renderHome);  

</script> 
</body> 
</html>
