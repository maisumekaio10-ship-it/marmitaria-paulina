            --black: #000;
            --white: #fff;

        }

        * {

            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            background:

        .container {

            align-items: center;
            justify-content: center;

        .card b {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 0.2px;
        }

        .category-card {

            align-items: center;
            justify-content: space-between;
            gap: 14px;
            cursor: pointer;
            transition: transform 0.18s ease;
        }

        .category-card:active {

        }

        .category-icon {

            height: 46px;
            border-radius: 14px;
            background: rgba(255, 215, 0, 0.12);

            align-items: center;
            justify-content: space-between;

            height: 34px;

            color: #111;

            text-align: center;

</head>

        function formatarCEP(input) {
            input.value = input.value.replace(/\D/g, "").slice(0, 8);
        }

        function formatarTelefone(input) {
            let valor = input.value.replace(/\D/g, "").slice(0, 11);
            if (valor.length > 10) {
                valor = valor.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
            } else if (valor.length > 6) {
                valor = valor.replace(/^(\d{2})(\d{4,5})(\d{0,4}).*/, '($1) $2-$3');
            } else if (valor.length > 2) {
                valor = valor.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
            } else if (valor.length > 0) {
                valor = valor.replace(/^(\d{0,2})/, '($1');
            }
            input.value = valor;
        }

        function normalizarTexto(txt) {
            return (txt || "").replace(/\s+/g, " ").trim();
        }

        function montarEnderecoClienteCompleto() {
            const cep = normalizarTexto(document.getElementById("cep")?.value || "");
            const endereco = normalizarTexto(document.getElementById("endereco")?.value || "");
            const numero = normalizarTexto(document.getElementById("num")?.value || "");
            const comp = normalizarTexto(document.getElementById("comp")?.value || "");

            if (!endereco) return "";

            let enderecoComNumero = endereco;
            if (numero) enderecoComNumero += `, ${numero}`;

            let partes = [enderecoComNumero];
            if (comp) partes.push(comp);
            if (cep) partes.push(cep);
            if (!endereco.toLowerCase().includes("são paulo")) partes.push(CIDADE_BASE);
            if (!endereco.toLowerCase().includes("sp")) partes.push(ESTADO_BASE);
            partes.push("Brasil");

            return partes.filter(Boolean).join(", ");
        }

        async function buscarCEP() {
            let cep = (document.getElementById("cep").value || "").replace(/\D/g, "");
            if (cep.length !== 8) return;

            try {
                let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                let data = await res.json();

                if (!data.erro) {
                    const enderecoMontado = [data.logradouro, data.bairro, data.localidade, data.uf]
                        .filter(Boolean)
                        .join(", ");
                    document.getElementById("endereco").value = enderecoMontado;
                    await calcularFrete();
                } else {
                    document.getElementById("freteBox").innerHTML = `<span class="frete-erro">CEP não encontrado.</span>`;
                }
            } catch (e) {
                document.getElementById("freteBox").innerHTML = `<span class="frete-erro">Erro ao consultar o CEP.</span>`;
            }
        }

        async function getCoordsNominatim(end) {
            try {
                const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${encodeURIComponent(end)}`;
                const res = await fetch(url, {
                    headers: {
                        "Accept-Language": "pt-BR,pt;q=0.9"
                    }
                });
                const data = await res.json();
                if (data && data[0]) {
                    return { lat: Number(data[0].lat), lon: Number(data[0].lon) };
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        async function geocodeORS(end) {
            if (!ORS_API_KEY) return null;

            try {
                const url = `https://api.openrouteservice.org/geocode/search?api_key=${ORS_API_KEY}&text=${encodeURIComponent(end)}&size=1&boundary.country=BR`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.features && data.features[0]) {
                    const [lon, lat] = data.features[0].geometry.coordinates;
                    return { lat: Number(lat), lon: Number(lon) };
                }

                return null;
            } catch (e) {
                return null;
            }
        }

        function distanciaReta(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a =
                Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) *
                Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) ** 2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        async function getRouteDistanceKm(origem, destino) {
            const res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/json", {
                method: "POST",
                headers: {
                    "Authorization": ORS_API_KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    coordinates: [
                        [origem.lon, origem.lat],
                        [destino.lon, destino.lat]
                    ]
                })
            });

            if (!res.ok) {
                throw new Error("Erro ao consultar rota real");
            }

            const data = await res.json();
            const metros = data.routes?.[0]?.summary?.distance;
            if (!metros) throw new Error("Distância da rota não encontrada");

            return metros / 1000;
        }

        function calcularFreteMotoboy(km) {
            if (!isFinite(km) || km <= 0) return 0;
            if (km <= 5) return 12;
            if (km <= 8) return 15;
            if (km <= 12) return 18;
            if (km <= 15) return 22;
            if (km <= 20) return 28;
            if (km <= 25) return 35;
            if (km <= 30) return 45;
            return 0;
        }

        function enderecoMinimoPreenchido() {
            const tipo = document.getElementById("tipo")?.value;
            if (tipo !== "Entrega") return false;

            const cep = normalizarTexto(document.getElementById("cep")?.value || "");
            const endereco = normalizarTexto(document.getElementById("endereco")?.value || "");
            const numero = normalizarTexto(document.getElementById("num")?.value || "");

            return cep.length === 8 && !!endereco && !!numero;
        }

        async function calcularFrete() {
            const freteBox = document.getElementById("freteBox");
            if (!freteBox) return;

            const tipo = document.getElementById("tipo")?.value;
            if (tipo !== "Entrega") {
                frete = 0;
                distanciaFreteKm = 0;
                freteBox.innerHTML = `<b>Retirada no local</b><br><span class="muted">Sem cobrança de frete.</span>`;
                return;
            }

            if (!enderecoMinimoPreenchido()) {
                frete = 0;
                distanciaFreteKm = 0;
                freteBox.innerHTML = `<span class="muted">Preencha CEP, endereço e número para calcular o frete.</span>`;
                return;
            }

            if (calculandoFrete) return;
            calculandoFrete = true;
            freteBox.innerHTML = `Calculando frete...`;

            const clienteCompleto = montarEnderecoClienteCompleto();

            try {
                let origem = await geocodeORS(RESTAURANTE_END);
                let destino = await geocodeORS(clienteCompleto);

                if (!origem || !destino) {
                    origem = await getCoordsNominatim(RESTAURANTE_END);
                    destino = await getCoordsNominatim(clienteCompleto);
                }

                if (!origem || !destino) {
                    throw new Error("Não foi possível localizar os endereços");
                }

                const kmReta = distanciaReta(origem.lat, origem.lon, destino.lat, destino.lon);

                if (kmReta > DISTANCIA_MAXIMA_KM * 1.2) {
                    frete = 0;
                    distanciaFreteKm = 0;
                    freteBox.innerHTML = `<span class="frete-erro">Endereço fora da área de entrega.</span><br><span class="muted">Consulte a loja para essa região.</span>`;
                    return;
                }

                let km = 0;

                try {
                    km = await getRouteDistanceKm(origem, destino);
                } catch (e) {
                    km = Math.max(kmReta * 1.3, 1);
                }

                if (!isFinite(km) || km <= 0) {
                    frete = 0;
                    distanciaFreteKm = 0;
                    freteBox.innerHTML = `<span class="frete-erro">Não foi possível calcular o frete com segurança.</span><br><span class="muted">Confira o endereço informado.</span>`;
                    return;
                }

                if (km > DISTANCIA_MAXIMA_KM) {
                    frete = 0;
                    distanciaFreteKm = 0;
                    freteBox.innerHTML = `<span class="frete-erro">Endereço fora da área de entrega.</span><br><span class="muted">Consulte a loja para essa região.</span>`;
                    return;
                }

                const valorFrete = calcularFreteMotoboy(km);

                if (valorFrete <= 0) {
                    frete = 0;
                    distanciaFreteKm = 0;
                    freteBox.innerHTML = `<span class="frete-erro">Essa região precisa de confirmação manual.</span><br><span class="muted">Consulte a loja para calcular o frete.</span>`;
                    return;
                }

                frete = valorFrete;
                distanciaFreteKm = km;

                freteBox.innerHTML = `
                    <b>Frete: R$ ${frete.toFixed(2)}</b><br>
                    <span class="muted">${km.toFixed(1)} km por rota estimada • entrega por motoboy</span>
                `;
            } catch (e) {
                frete = 0;
                distanciaFreteKm = 0;
                freteBox.innerHTML = `<span class="frete-erro">Erro ao calcular frete.</span><br><span class="muted">Confira o endereço e tente novamente.</span>`;
            } finally {
                calculandoFrete = false;
            }
        }

        async function revisao() {
            const nome = document.getElementById("nome").value.trim();
            const fone = document.getElementById("fone").value.trim();
            const tipo = document.getElementById("tipo").value;

            if (!nome || !fone) {
                alert("Preencha nome e telefone");
                return;
            }

            if (tipo === "Entrega") {
                const cep = normalizarTexto(document.getElementById("cep").value || "");
                const endereco = normalizarTexto(document.getElementById("endereco").value || "");
                const num = normalizarTexto(document.getElementById("num").value || "");

                if (cep.length !== 8 || !endereco || !num) {
                    alert("Preencha CEP, endereço e número para entrega");
                    return;
                }

                await calcularFrete();

                if (frete <= 0) {
                    alert("Não foi possível calcular o frete automaticamente. Consulte a loja pelo WhatsApp.");
                    return;
                }
            }

            dadosPedido = {
                nome,
                fone,
                tipo,
                cep: document.getElementById("cep") ? document.getElementById("cep").value : "",
                endereco: document.getElementById("endereco") ? document.getElementById("endereco").value : "",
                num: document.getElementById("num") ? document.getElementById("num").value : "",
                comp: document.getElementById("comp") ? document.getElementById("comp").value : "",
                pag: document.getElementById("pag").value
            };

            navigate(renderRevisao);
        }

        function renderRevisao() {
            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const total = dadosPedido.tipo === "Entrega" ? subtotal + frete : subtotal;

            let html = `
                <div class="flex" style="margin-bottom:14px;">
                    <button class="ghost" onclick="history.back()">⬅ Voltar</button>
                    <div class="pill">✅ Confirmar pedido</div>
                </div>

                <div class="card">
                    <div class="revisao-line"><b>Cliente:</b> ${dadosPedido.nome}</div>
                    <div class="revisao-line"><b>Telefone:</b> ${dadosPedido.fone}</div>
                    <div class="revisao-line"><b>Tipo:</b> ${dadosPedido.tipo}</div>
                    <div class="revisao-line"><b>Pagamento:</b> ${dadosPedido.pag}</div>
            `;

            if (dadosPedido.tipo === "Entrega") {
                html += `
                    <div class="revisao-line"><b>CEP:</b> ${dadosPedido.cep}</div>
                    <div class="revisao-line"><b>Endereço:</b> ${dadosPedido.endereco}, Nº ${dadosPedido.num}${dadosPedido.comp ? ` (${dadosPedido.comp})` : ""}</div>
                    <div class="revisao-line"><b>Distância estimada:</b> ${distanciaFreteKm ? distanciaFreteKm.toFixed(1) + " km" : "-"}</div>
                `;
            }

            html += `<div class="divider"></div><div class="revisao-line"><b>Itens do pedido:</b></div>`;

            cart.forEach(i => {
                html += `<div class="revisao-line">${i.qty}x ${i.name}</div>`;
            });

            html += `
                    <div class="divider"></div>
                    <div class="flex"><span>Subtotal</span><b>R$ ${subtotal.toFixed(2)}</b></div>
            `;

            if (dadosPedido.tipo === "Entrega") {
                html += `<div class="flex" style="margin-top:8px;"><span>Frete</span><b>R$ ${frete.toFixed(2)}</b></div>`;
            }

            html += `
                    <div class="flex" style="margin-top:10px;font-size:18px;">
                        <span><b>Total</b></span>
                        <b style="color:#ffe486;">R$ ${total.toFixed(2)}</b>
                    </div>
                    <div class="divider"></div>
                    <button class="primary" onclick="finalizar()">Enviar pedido</button>
                </div>
            `;

            document.getElementById("app").innerHTML = html;
            updateCartButton();
        }

        function finalizar() {
            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const total = dadosPedido.tipo === "Entrega" ? subtotal + frete : subtotal;

            let msg = "*Pedido - Laencasa Ultracongelados*%0A%0A";
            msg += `Nome: ${dadosPedido.nome}%0A`;
            msg += `Telefone: ${dadosPedido.fone}%0A`;
            msg += `Tipo: ${dadosPedido.tipo}%0A`;

            if (dadosPedido.tipo === "Entrega") {
                msg += `CEP: ${dadosPedido.cep}%0A`;
                msg += `Endereço: ${dadosPedido.endereco}, Nº ${dadosPedido.num}%0A`;
                if (dadosPedido.comp) msg += `Comp: ${dadosPedido.comp}%0A`;
                if (distanciaFreteKm) msg += `Distância estimada: ${distanciaFreteKm.toFixed(1)} km%0A`;
                msg += `Frete: R$ ${frete.toFixed(2)}%0A`;
            }

            msg += `%0AItens:%0A`;
            cart.forEach(i => {
                msg += `${i.qty}x ${i.name} - R$ ${(i.price * i.qty).toFixed(2)}%0A`;
            });

            msg += `%0ASubtotal: R$ ${subtotal.toFixed(2)}%0A`;
            msg += `Total: R$ ${total.toFixed(2)}%0A`;
            msg += `Pagamento: ${dadosPedido.pag}%0A`;

            window.open(`https://wa.me/${No}?text=${msg}`, "_blank");
        }

        navigate(renderHome);
    </script>
</body>

</html>
