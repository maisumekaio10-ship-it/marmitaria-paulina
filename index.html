<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paulina Marmitex</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#8B0000;color:#fff;padding:15px;text-align:center;font-weight:bold}
.container{padding:15px;padding-bottom:90px}
h3{margin-top:0}
.card{background:#fff;padding:12px;margin:10px 0;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
button{padding:10px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.primary{background:#8B0000;color:#fff;width:100%}
.small{padding:5px 10px;font-size:14px}
input,select{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc}
.hidden{display:none}
.flex{display:flex;justify-content:space-between;align-items:center}

/* CÍRCULOS */
.catCircle{
width:60px;
height:60px;
border-radius:50%;
background:#8B0000;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
font-size:12px;
}

.prodCircle{
width:50px;
height:50px;
border-radius:50%;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
text-align:center;
padding:4px;
}

#cartBtn{
position:fixed;bottom:20px;right:20px;
background:#8B0000;color:white;
width:60px;height:60px;border-radius:50%;
display:flex;justify-content:center;align-items:center;
font-size:20px;box-shadow:0 4px 10px rgba(0,0,0,.3);
cursor:pointer}

#cartCount{
position:absolute;top:-5px;right:-5px;
background:#fff;color:#8B0000;
width:22px;height:22px;border-radius:50%;
font-size:13px;display:flex;justify-content:center;align-items:center}

.toast{
position:fixed;bottom:90px;left:50%;
transform:translateX(-50%);
background:#4CAF50;color:white;
padding:10px 20px;border-radius:20px;
display:none}
</style>
</head>

<body>

Paulina Marmitex<br>
<small>Tradição e Sabor Caseiro</small>
</header>

<div class="container" id="app"></div>

<div id="cartBtn" onclick="goCart()">
🛒
<div id="cartCount">0</div>
</div>

<div class="toast" id="toast">Item adicionado</div>

<script>

const TAXA = 7;
let cart=[];
let currentView="home";

const produtos={ ... }  // MANTIVE SEU OBJETO ORIGINAL (não alterado)

function renderHome(){
currentView="home";
history.pushState({page:"home"},"");

let html="<h3>Categorias</h3>";
for(let cat in produtos){
html+=`
<div class="card" onclick="openCat('${cat}')">
<div style="display:flex;align-items:center;gap:15px;">
<div class="catCircle">${cat}</div>
<b>${cat}</b>
</div>
</div>`;
}
document.getElementById("app").innerHTML=html;
}

function openCat(cat){
currentView="cat";
history.pushState({page:"cat"},"");

let html=`<button onclick="history.back()">⬅ Voltar</button><h3>${cat}</h3>`;

produtos[cat].forEach((p,i)=>{
html+=`<div class="card">
<div class="flex">
<div style="display:flex;align-items:center;gap:10px;">
<div class="prodCircle">${p.name.split(" ")[1] || ""}</div>
<div>
<b>${p.name}</b><br>
R$ ${p.price.toFixed(2)}
</div>
</div>
<button class="primary small" onclick="add('${cat}',${i})">Adicionar</button>
</div>
</div>`;
});

document.getElementById("app").innerHTML=html;
}

function add(cat,i){
let item=produtos[cat][i];
let f=cart.find(x=>x.name==item.name);
if(f){f.qty++}else{cart.push({...item,qty:1})}
updateCart();
toast();
}

function updateCart(){
document.getElementById("cartCount").innerText=
cart.reduce((s,i)=>s+i.qty,0);
}

function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

function goCart(){
currentView="cart";
history.pushState({page:"cart"},"");

let html="<button onclick='history.back()'>⬅ Voltar</button><h3>Carrinho</h3>";
let subtotal=0;

cart.forEach((i)=>{
subtotal+=i.price*i.qty;
html+=`
<div class="card flex">
<div>${i.qty}x ${i.name}</div>
<div>R$ ${(i.price*i.qty).toFixed(2)}</div>
</div>`;
});

html+=`<h4>Subtotal: R$ ${subtotal.toFixed(2)}</h4>
<button class="primary" onclick="checkout()">Continuar</button>`;
document.getElementById("app").innerHTML=html;
}

function checkout(){
currentView="checkout";
history.pushState({page:"checkout"},"");

let html=... // MANTIVE SEU BLOCO ORIGINAL INTACTO

document.getElementById("app").innerHTML=html;
}

}

/* CONFIRMAÇÃO REAL AO SAIR */
window.addEventListener("beforeunload",function(e){
if(currentView==="home"){
e.preventDefault();
e.returnValue="";
}
});

/* VOLTAR CORRETO ENTRE TELAS */
window.onpopstate=function(event){
if(event.state && event.state.page==="home"){
renderHome();
}
};

renderHome();

</script>
</body>
</html>
