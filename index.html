<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <title>Laencasa Ultracongelados</title>

    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #8B0000;
            --primary-dark: #8b1a1a;
            --secondary: #FFD700;
            --black: #000;
            --white: #fff;
            --background: #8B0000;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            background: var(--background);
            color: var(--white);
        }

        .container {
            padding: 20px 16px 100px;
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--primary);
            padding: 10px;
        }

        .logo-box {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-title {
            text-align: center;
            font-size: 32px;
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
        }

        .header-sub {
            text-align: center;
            font-size: 18px;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 1.5px;
        }

        .card {
            background: #111;
            padding: 16px;
            margin-bottom: 14px;
            border-radius: 16px;
        }

        .card b {
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.3px;
        }

        .flex {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 12px;
            font-family: 'Inter';
            font-weight: 600;
            cursor: pointer;
        }

        .primary {
            background: var(--secondary);
            color: #000;
            height: 44px;
            width: 100%;
        }

        .small {
            width: auto;
            height: 36px;
            padding: 0 14px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 8px 0 14px;
            border-radius: 12px;
            border: none;
            font-family: 'Inter';
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--secondary);
            color: black;
            padding: 12px 22px;
            border-radius: 30px;
            display: none;
        }

        .grid-kits {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            align-items: start;
        }

        .grid-kits .card {
            margin: 0;
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
        }

        .grid-kits img {
            width: 100%;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 8px;
            background: #000;
        }

        .img-clickable {
            cursor: pointer;
        }

        .grid-kits .card p {
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 12px;
            line-height: 1.4;
        }

        .search-input {
            margin-bottom: 15px;
            border: 2px solid var(--secondary);
        }

        .remove-btn {
            background: #ff4444;
            color: white;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 8px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-content {
            background: #111;
            width: 85%;
            max-width: 350px;
            border-radius: 20px;
            padding: 15px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        .modal img {
            width: 100%;
            border-radius: 15px;
            display: block;
        }

        .close-modal {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--secondary);
            color: black;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #000;
        }

        #cart-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--secondary);
            color: #000;
            border-radius: 50px;
            padding: 12px 20px;
            font-weight: 700;
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #cart-btn span {
            background: #000;
            color: #fff;
            padding: 2px 6px;
            border-radius: 50%;
            font-size: 14px;
        }

        #carousel-container::-webkit-scrollbar {
            display: none;
        }

        .frete-info {
            margin: 10px 0 14px;
            font-size: 15px;
            line-height: 1.5;
        }

        .frete-erro {
            color: #FFD700;
            font-weight: 700;
        }

        .muted {
            color: #ddd;
            font-size: 12px;
        }
    </style>
</head>

        function startCarousel() {
            if (carouselTimer) clearInterval(carouselTimer);
            const container = document.getElementById('carousel-container');
            if (!container) return;

            carouselTimer = setInterval(() => {
                const scrollAmount = container.offsetWidth * 0.8;
                if (container.scrollLeft + container.offsetWidth >= container.scrollWidth) {
                    container.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                }
            }, 4000);
        }

        function openCat(cat) {
            if (carouselTimer) clearInterval(carouselTimer);
            let html = `<button onclick="history.back()">⬅ Voltar</button><h3>${cat}</h3>`;

            html += `
                <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar produto..." onkeyup="filterProducts('${cat}')">
                <div class="grid-kits" id="productGrid">`;

            produtos[cat].forEach((p, i) => {
                html += renderProductCard(p, cat, i);
            });
            html += `</div>`;
            document.getElementById("app").innerHTML = html;
            updateCartButton();
        }

        function renderProductCard(p, cat, i) {
            const isKit = cat === "KIT MARMITAS CONGELADAS";
            const clickAction = isKit ? `onclick="openModal('${p.img}','${p.descricao}')"` : "";
            const cursorClass = isKit ? "img-clickable" : "";

            return `
                <div class="card product-item">
                    <img src="${p.img}" class="${cursorClass}" ${clickAction}>
                    <b class="product-name">${p.name}</b><br>
                    <p style="color:#ccc;margin:4px 0 6px;">${p.descricao}</p>
                    <div class="flex">
                        <div style="font-size:11px">
                            <s>R$ ${p.oldPrice}</s><br>
                            <span style="color:#FFD700;font-weight:700;font-size:14px">R$ ${p.price}</span>
                        </div>
                        <button class="primary small" onclick="add('${cat}',${i})">+</button>
                    </div>
                </div>`;
        }

        function filterProducts(cat) {
            let val = document.getElementById("searchInput").value.toLowerCase();
            let items = document.getElementsByClassName("product-item");
            produtos[cat].forEach((p, i) => {
                let match = p.name.toLowerCase().includes(val);
                items[i].style.display = match ? "flex" : "none";
            });
        }

        function openModal(img, desc) {
            modalAberto = true;
            history.pushState({ modal: true }, "");

            let modal = document.createElement("div");
            modal.className = "modal";
            modal.id = "modalView";
            modal.innerHTML = `
                <div class="modal-content" onclick="event.stopPropagation()">
                    <div class="close-modal" onclick="fecharModal()">X</div>
                    <img src="${img}">
                    <p style="text-align:center; margin-top:15px; font-weight:600; font-size:14px; color:#fff;">${desc}</p>
                </div>`;
            modal.onclick = fecharModal;
            document.body.appendChild(modal);
        }

        function fecharModal() {
            let m = document.getElementById("modalView");
            if (m) m.remove();
            modalAberto = false;
        }

        function add(cat, i) {
            let item = produtos[cat][i];
            let f = cart.find(x => x.name == item.name);
            if (f) {
                f.qty++;
            } else {
                cart.push({ ...item, qty: 1 });
            }
            toast();
            updateCartButton();
        }

            cart.splice(index, 1);
            renderCart();
            updateCartButton();
        }

        function toast() {
            let t = document.getElementById("toast");
            t.style.display = "block";
            setTimeout(() => t.style.display = "none", 1500);
        }

        function updateCartButton() {
            let btn = document.getElementById("cart-btn");
            if (cart.length > 0) {
                btn.classList.remove("hidden");
            } else {
                btn.classList.add("hidden");
            }
            document.getElementById("cart-count").innerText = cart.reduce((s, i) => s + i.qty, 0);
        }

        function renderCart() {
            let html = "<button onclick='history.back()'>⬅ Voltar</button><h3>Carrinho</h3>";
            let subtotal = 0;
            if (cart.length === 0) {
                html += "<p>Seu carrinho está vazio.</p>";
            } else {
                cart.forEach((i, index) => {
                    subtotal += i.price * i.qty;
                    html += `
                    <div class="card flex">
                        <div>${i.qty}x ${i.name}<br><small>R$ ${(i.price * i.qty).toFixed(2)}</small></div>
                        <button class="remove-btn" onclick="removeFromCart(${index})">X</button>
                    </div>`;
                });
                html += `<h4>Subtotal: R$ ${subtotal.toFixed(2)}</h4>`;
                html += `<button class="primary" onclick="navigate(renderCheckout)">Avançar para Checkout</button>`;
            }
            document.getElementById("app").innerHTML = html;
        }

        function renderCheckout() {
            let html = `
                <button onclick="history.back()">⬅ Voltar</button><h3>Dados do Pedido</h3>
                <input id="nome" placeholder="Seu nome">
                <input id="fone" placeholder="Telefone">
                <select id="tipo" onchange="toggleEndereco()">
                    <option value="Entrega">Entrega</option>
                    <option value="Retirada">Retirada</option>
                </select>
                <div id="enderecoBox">
                    <input id="cep" placeholder="CEP" onblur="buscarCEP()" oninput="formatarCEP(this)">
                    <input id="endereco" placeholder="Rua / Bairro" onblur="calcularFrete()">
                    <div class="flex" style="gap:10px">
                        <input id="num" placeholder="Nº" style="width:30%" onblur="calcularFrete()">
                        <input id="comp" placeholder="Complemento" style="width:70%" onblur="calcularFrete()">
                    </div>
                </div>
                <label>Pagamento:</label>
                <select id="pag">
                    <option>Pix</option>
                    <option>Cartão</option>
                    <option>Voucher</option>
                </select>
                <div id="freteBox" class="frete-info"></div>
                <button class="primary" onclick="revisao()">Revisar Pedido</button>`;
            document.getElementById("app").innerHTML = html;
        }

        function toggleEndereco() {
            const isEntrega = document.getElementById("tipo").value === "Entrega";
            document.getElementById("enderecoBox").classList.toggle("hidden", !isEntrega);
            document.getElementById("freteBox").innerHTML = isEntrega ? "" : "<b>Retirada no local</b>";
            if (!isEntrega) {
                frete = 0;
                distanciaFreteKm = 0;
            }
        }

        function formatarCEP(input) {
            input.value = input.value.replace(/\D/g, "").slice(0, 8);
        }

        function normalizarTexto(txt) {
            return (txt || "").replace(/\s+/g, " ").trim();
        }

        function montarEnderecoClienteCompleto() {
            const cep = normalizarTexto(document.getElementById("cep")?.value || "");
            const endereco = normalizarTexto(document.getElementById("endereco")?.value || "");
            const numero = normalizarTexto(document.getElementById("num")?.value || "");
            const comp = normalizarTexto(document.getElementById("comp")?.value || "");

            if (!endereco) return "";

            let partes = [endereco];

            if (numero) partes.push(numero);
            if (comp) partes.push(comp);

            if (cep) partes.push(cep);

            if (!endereco.toLowerCase().includes("são paulo")) partes.push(CIDADE_BASE);
            if (!endereco.toLowerCase().includes("sp")) partes.push(ESTADO_BASE);

            partes.push("Brasil");

            return partes.filter(Boolean).join(", ");
        }

        async function buscarCEP() {
            let cep = (document.getElementById("cep").value || "").replace(/\D/g, "");
            if (cep.length !== 8) return;

            try {
                let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                let data = await res.json();

                if (!data.erro) {
                    const enderecoMontado = [data.logradouro, data.bairro, data.localidade, data.uf]
                        .filter(Boolean)
                        .join(", ");
                    document.getElementById("endereco").value = enderecoMontado;
                    await calcularFrete();
                } else {
                    document.getElementById("freteBox").innerHTML = `<span class="frete-erro">CEP não encontrado.</span>`;
                }
            } catch (e) {
                document.getElementById("freteBox").innerHTML = `<span class="frete-erro">Erro ao consultar o CEP.</span>`;
            }
        }

        async function getCoordsNominatim(end) {
            try {
                let url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${encodeURIComponent(end)}`;
                let res = await fetch(url, {
                    headers: {
                        "Accept-Language": "pt-BR,pt;q=0.9"
                    }
                });
                let data = await res.json();
                if (data && data[0]) {
                    return { lat: Number(data[0].lat), lon: Number(data[0].lon) };
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        async function geocodeORS(end) {
            if (!ORS_API_KEY) return null;

            try {
                const url = `https://api.openrouteservice.org/geocode/search?api_key=${ORS_API_KEY}&text=${encodeURIComponent(end)}&size=1&boundary.country=BR`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.features && data.features[0]) {
                    const [lon, lat] = data.features[0].geometry.coordinates;
                    return { lat: Number(lat), lon: Number(lon) };
                }

                return null;
            } catch (e) {
                return null;
            }
        }

        function distanciaReta(lat1, lon1, lat2, lon2) {
            let R = 6371;
            let dLat = (lat2 - lat1) * Math.PI / 180;
            let dLon = (lon2 - lon1) * Math.PI / 180;
            let a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        async function getRouteDistanceKm(origem, destino) {
            const res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/json", {
                method: "POST",
                headers: {
                    "Authorization": ORS_API_KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    coordinates: [
                        [origem.lon, origem.lat],
                        [destino.lon, destino.lat]
                    ]
                })
            });

            if (!res.ok) {
                throw new Error("Erro ao consultar rota real");
            }

            const data = await res.json();
            const metros = data.routes?.[0]?.summary?.distance;

            if (!metros) {
                throw new Error("Distância da rota não encontrada");
            }

            return metros / 1000;
        }

        function calcularFreteMotoboy(km) {
            let valor = 0;

            if (km <= 3) {
                valor = 10.90;
            } else if (km <= 5) {
                valor = 12.90 + ((km - 3) * 2.20);
            } else if (km <= 8) {
                valor = 17.30 + ((km - 5) * 2.60);
            } else if (km <= 12) {
                valor = 25.10 + ((km - 8) * 2.90);
            } else {
                valor = 36.70 + ((km - 12) * 3.20);
            }

            if (valor < FRETE_MINIMO_MOTO) valor = FRETE_MINIMO_MOTO;
            return Number(valor.toFixed(2));
        }

        function enderecoMinimoPreenchido() {
            const tipo = document.getElementById("tipo")?.value;
            if (tipo !== "Entrega") return false;

            const cep = normalizarTexto(document.getElementById("cep")?.value || "");
            const endereco = normalizarTexto(document.getElementById("endereco")?.value || "");
            const numero = normalizarTexto(document.getElementById("num")?.value || "");

            return cep.length === 8 && !!endereco && !!numero;
        }

        async function calcularFrete() {
            const freteBox = document.getElementById("freteBox");
            if (!freteBox) return;

            const tipo = document.getElementById("tipo")?.value;
            if (tipo !== "Entrega") {
                frete = 0;
                distanciaFreteKm = 0;
                freteBox.innerHTML = "<b>Retirada no local</b>";
                return;
            }

            if (!enderecoMinimoPreenchido()) {
                frete = 0;
                distanciaFreteKm = 0;
                freteBox.innerHTML = `<span class="muted">Preencha CEP, endereço e número para calcular o frete.</span>`;
                return;
            }

            if (calculandoFrete) return;
            calculandoFrete = true;
            freteBox.innerHTML = "Calculando frete...";

            const clienteCompleto = montarEnderecoClienteCompleto();

            try {
                let origem = await geocodeORS(RESTAURANTE_END);
                let destino = await geocodeORS(clienteCompleto);

                if (!origem || !destino) {
                    origem = await getCoordsNominatim(RESTAURANTE_END);
                    destino = await getCoordsNominatim(clienteCompleto);
                }

                if (!origem || !destino) {
                    throw new Error("Não foi possível localizar os endereços");
                }

                const kmReta = distanciaReta(origem.lat, origem.lon, destino.lat, destino.lon);

                if (kmReta > DISTANCIA_MAXIMA_KM) {
                    frete = 0;
                    distanciaFreteKm = 0;
                    freteBox.innerHTML = `<span class="frete-erro">Endereço fora da área de entrega.</span><br><span class="muted">Distância estimada acima do limite permitido.</span>`;
                    calculandoFrete = false;
                    return;
                }

                let km = 0;

                try {
                    km = await getRouteDistanceKm(origem, destino);
                } catch (e) {
                    km = kmReta * 1.35;
                }

                if (!isFinite(km) || km <= 0 || km > DISTANCIA_MAXIMA_KM) {
                    frete = 0;
                    distanciaFreteKm = 0;
                    freteBox.innerHTML = `<span class="frete-erro">Não foi possível calcular o frete com segurança.</span>`;
                    calculandoFrete = false;
                    return;
                }

                const valorFrete = calcularFreteMotoboy(km);

                if (valorFrete > FRETE_MAXIMO_AUTOMATICO) {
                    frete = 0;
                    distanciaFreteKm = 0;
                    freteBox.innerHTML = `<span class="frete-erro">Endereço fora da política de frete automático.</span>`;
                    calculandoFrete = false;
                    return;
                }

                frete = valorFrete;
                distanciaFreteKm = km;

                freteBox.innerHTML = `
                    <b>Frete: R$ ${frete.toFixed(2)}</b>
                    <small>(${km.toFixed(1)} km por rota estimada)</small><br>
                    <span class="muted">Cálculo para entrega por motoboy.</span>
                `;
            } catch (e) {
                frete = 0;
                distanciaFreteKm = 0;
                freteBox.innerHTML = `<span class="frete-erro">Erro ao calcular frete. Confira o endereço.</span>`;
            } finally {
                calculandoFrete = false;
            }
        }

        async function revisao() {
            const nome = document.getElementById("nome").value.trim();
            const fone = document.getElementById("fone").value.trim();
            const tipo = document.getElementById("tipo").value;

            if (!nome || !fone) {
                alert("Preencha nome e telefone");
                return;
            }

            if (tipo === "Entrega") {
                const cep = normalizarTexto(document.getElementById("cep").value || "");
                const endereco = normalizarTexto(document.getElementById("endereco").value || "");
                const num = normalizarTexto(document.getElementById("num").value || "");

                if (cep.length !== 8 || !endereco || !num) {
                    alert("Preencha CEP, endereço e número para entrega");
                    return;
                }

                await calcularFrete();

                if (!frete || frete <= 0) {
                    alert("Não foi possível calcular o frete corretamente. Confira o endereço.");
                    return;
                }
            }

            dadosPedido = {
                nome: nome,
                fone: fone,
                tipo: tipo,
                cep: document.getElementById("cep") ? document.getElementById("cep").value : "",
                endereco: document.getElementById("endereco") ? document.getElementById("endereco").value : "",
                num: document.getElementById("num") ? document.getElementById("num").value : "",
                comp: document.getElementById("comp") ? document.getElementById("comp").value : "",
                pag: document.getElementById("pag").value
            };

            navigate(renderRevisao);
        }

        function renderRevisao() {
            let subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            let total = dadosPedido.tipo == "Entrega" ? subtotal + frete : subtotal;
            let html = "<h3>Confirmar Pedido</h3>";
            html += `Cliente: ${dadosPedido.nome}<br>`;
            html += `Telefone: ${dadosPedido.fone}<br>`;

            if (dadosPedido.tipo == "Entrega") {
                html += `Endereço: ${dadosPedido.endereco}, Nº ${dadosPedido.num}${dadosPedido.comp ? ' (' + dadosPedido.comp + ')' : ''}<br>`;
                html += `CEP: ${dadosPedido.cep}<br>`;
                html += `Frete calculado por motoboy: ${distanciaFreteKm ? distanciaFreteKm.toFixed(1) + " km" : "-"}<br>`;
            }

            html += "<br><b>Itens:</b><br>";
            cart.forEach(i => {
                html += `${i.qty}x ${i.name}<br>`;
            });

            html += `<hr>Subtotal: R$ ${subtotal.toFixed(2)}<br>`;
            if (dadosPedido.tipo == "Entrega") {
                html += `Frete: R$ ${frete.toFixed(2)}<br>`;
            }
            html += `Total: R$ ${total.toFixed(2)}<br>`;
            html += `Pagamento: ${dadosPedido.pag}<br>`;
            html += `<br><button class="primary" onclick="finalizar()">Enviar Pedido</button>`;
            document.getElementById("app").innerHTML = html;
            updateCartButton();
        }

        function finalizar() {
            let subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            let total = dadosPedido.tipo == "Entrega" ? subtotal + frete : subtotal;

            let msg = "*Pedido - Laencasa Ultracongelados*%0A%0A";
            msg += `Nome: ${dadosPedido.nome}%0A`;
            msg += `Telefone: ${dadosPedido.fone}%0A`;
            msg += `Tipo: ${dadosPedido.tipo}%0A`;

            if (dadosPedido.tipo == "Entrega") {
                msg += `CEP: ${dadosPedido.cep}%0A`;
                msg += `Endereço: ${dadosPedido.endereco}, Nº ${dadosPedido.num}%0A`;
                if (dadosPedido.comp) msg += `Comp: ${dadosPedido.comp}%0A`;
                if (distanciaFreteKm) msg += `Distância estimada: ${distanciaFreteKm.toFixed(1)} km%0A`;
            }

            msg += `%0AItens:%0A`;
            cart.forEach(i => {
                msg += `${i.qty}x ${i.name}%0A`;
            });

            msg += `%0ASubtotal: R$ ${subtotal.toFixed(2)}%0A`;
            if (dadosPedido.tipo == "Entrega") {
                msg += `Frete: R$ ${frete.toFixed(2)}%0A`;
            }
            msg += `Total: R$ ${total.toFixed(2)}%0A`;
            msg += `Pagamento: ${dadosPedido.pag}%0A`;

            window.open(`https://wa.me/5511952282056?text=${msg}`);
        }

        navigate(renderHome);
    </script>
