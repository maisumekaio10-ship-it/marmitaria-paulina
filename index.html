<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laencasa Ultracongelados</title>

    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Inter:wght@400;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #A31D21; /* Vermelho do seu logo */
            --secondary: #FFD700; /* Amarelo do seu logo */
            --white: #ffffff;
            --background: #A31D21;
            --card-bg: #1a1a1a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--white);
            overflow-x: hidden;
        }

        /* HEADER IDENTIDADE VISUAL */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--primary);
            padding: 20px 15px;
            border-bottom: 3px solid var(--secondary);
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .brand-container {
            line-height: 0.9;
            margin-bottom: 15px;
        }

        .header-title {
            font-family: 'Kaushan Script', cursive;
            font-size: 52px;
            color: var(--white);
            margin: 0;
            display: block;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header-tagline {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--white);
            display: block;
            margin-top: 5px;
        }

        .header-sub {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 1.5px;
            color: var(--secondary);
            margin-top: 15px;
        }

        .logo-box {
            width: 90px;
            height: 90px;
            background: #fff;
            margin: 10px auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid var(--secondary);
            overflow: hidden;
        }

        .logo-box img { width: 85%; height: 85%; object-fit: contain; }

        .cta-banner {
            background: var(--secondary);
            color: #000;
            padding: 12px;
            text-align: center;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* CONTEÚDO E CARDS */
        .container { padding: 20px 16px 100px; max-width: 600px; margin: 0 auto; }

        .card {
            background: var(--card-bg);
            padding: 16px;
            margin-bottom: 14px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card b { font-size: 16px; color: var(--secondary); }

        .flex { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

        button {
            border: none;
            border-radius: 12px;
            font-family: 'Inter';
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .primary { background: var(--secondary); color: #000; height: 48px; width: 100%; font-size: 16px; }
        .primary:active { transform: scale(0.98); }
        .small { width: auto; height: 38px; padding: 0 18px; }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0 14px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            font-size: 15px;
        }

        .grid-kits {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .grid-kits .card { margin: 0; padding: 12px; text-align: center; }
        .grid-kits img { width: 100%; border-radius: 10px; margin-bottom: 10px; aspect-ratio: 1/1; object-fit: cover; }

        .search-input { margin-bottom: 20px; border: 2px solid var(--secondary); }

        /* CARRINHO FLUTUANTE */
        #cart-btn {
            position: fixed;
            bottom: 25px;
            right: 20px;
            background: var(--secondary);
            color: #000;
            border-radius: 50px;
            padding: 15px 25px;
            font-weight: 800;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }

        /* CARROSSEL */
        #carousel-container {
            overflow-x: auto;
            display: flex;
            gap: 12px;
            margin-top: 20px;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }
        #carousel-container::-webkit-scrollbar { display: none; }
        #carousel-container img { width: 85%; flex-shrink: 0; border-radius: 15px; border: 2px solid rgba(255,255,255,0.1); }

        .hidden { display: none; }
    </style>
</head>

        function navigate(fn) {
            viewStack.push(fn);
            history.pushState({}, "");
            fn();
        }

        window.addEventListener("popstate", function() {
            if (viewStack.length > 1) {
                viewStack.pop();
                let last = viewStack[viewStack.length - 1];
                last();
            }

        function startCarousel() {
            if (carouselTimer) clearInterval(carouselTimer);
            const container = document.getElementById('carousel-container');
            if (!container) return;
            carouselTimer = setInterval(() => {
                const scrollAmount = container.offsetWidth * 0.8;
                if (container.scrollLeft + container.offsetWidth >= container.scrollWidth - 10) {
                    container.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                }
            }, 2500); 
        }

        function openCat(cat) {
            if (carouselTimer) clearInterval(carouselTimer);
            let html = `<button onclick="history.back()" style="background:none; color:var(--white); padding: 10px 0; font-size:16px">⬅ Voltar</button>
                        <h3 style="color:var(--secondary)">${cat}</h3>`;
            html += `<input type="text" id="searchInput" class="search-input" placeholder="Pesquisar..." onkeyup="filterProducts('${cat}')">
                     <div class="grid-kits" id="productGrid">`;
            
            produtos[cat].forEach((p, i) => {
                html += `
                <div class="card product-item">
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=Marmita'">
                    <b style="font-size:14px; color:#fff">${p.name}</b><br>
                    <p style="color:#ccc;font-size:11px;margin:8px 0">${p.descricao}</p>
                    <div class="flex">
                        <div style="font-size:12px">
                            <s style="color:#777">R$ ${p.oldPrice}</s><br>
                            <span style="color:var(--secondary);font-weight:800;font-size:15px">R$ ${p.price}</span>
                        </div>
                        <button class="primary small" onclick="add('${cat}',${i})">+</button>
                    </div>
                </div>`;
            });
            html += `</div>`;
            document.getElementById("app").innerHTML = html;
        }

        function filterProducts(cat) {
            let val = document.getElementById("searchInput").value.toLowerCase();
            let items = document.getElementsByClassName("product-item");
            produtos[cat].forEach((p, i) => {
                let match = p.name.toLowerCase().includes(val);
                items[i].style.display = match ? "block" : "none";
            });
        }

        function add(cat, i) {
            let item = produtos[cat][i];
            let f = cart.find(x => x.name == item.name);
            if (f) { f.qty++ } else { cart.push({...item, qty: 1}) }
            updateCartButton();
        }

        function updateCartButton() {
            let btn = document.getElementById("cart-btn");
            if (cart.length > 0) {
                btn.classList.remove("hidden");
            } else {
                btn.classList.add("hidden");
            }
            document.getElementById("cart-count").innerText = cart.reduce((s, i) => s + i.qty, 0);
        }

        function renderCart() {
            let html = "<button onclick='history.back()'>⬅ Voltar</button><h3>Meu Carrinho</h3>";
            let subtotal = 0;
            if (cart.length === 0) {
                html += "<p>Seu carrinho está vazio.</p>";
            } else {
                cart.forEach((i, index) => {
                    subtotal += i.price * i.qty;
                    html += `<div class="card flex">
                        <div><b>${i.qty}x</b> ${i.name}<br><small>R$ ${(i.price*i.qty).toFixed(2)}</small></div>
                        <button style="color:#ff4444; background:none; font-size:20px" onclick="removeFromCart(${index})">&times;</button>
                    </div>`;
                });
                html += `<div class="card"><h4>Subtotal: R$ ${subtotal.toFixed(2)}</h4></div>`;
                html += `<button class="primary" onclick="navigate(renderCheckout)">FINALIZAR PEDIDO</button>`;
            }
            document.getElementById("app").innerHTML = html;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
            updateCartButton();
        }

        function renderCheckout() {
            let html = `
                <button onclick="history.back()">⬅ Voltar</button><h3>Finalização</h3>

                <input id="fone" placeholder="Seu WhatsApp">

                    <option value="Retirada">Retirada no local</option>
                </select>
                <div id="enderecoBox">
                    <input id="cep" placeholder="CEP" onblur="buscarCEP()">
                    <input id="endereco" placeholder="Endereço (Rua e Bairro)">
                    <input id="num" placeholder="Número / Apto">
                </div>
                <select id="pag">
                    <option>Pix</option>
                    <option>Cartão de Crédito</option>
                    <option>Cartão de Débito</option>
                    <option>Dinheiro</option>
                </select>
                <div id="freteBox" style="margin-bottom:15px; color:var(--secondary); font-weight:bold"></div>
                <button class="primary" onclick="revisao()">REVISAR PEDIDO</button>`;
            document.getElementById("app").innerHTML = html;
        }

        function toggleEndereco() {
            document.getElementById("enderecoBox").classList.toggle("hidden", document.getElementById("tipo").value != "Entrega");
        }

        async function buscarCEP() {
            let cep = document.getElementById("cep").value.replace(/\D/g, '');
            if (cep.length < 8) return;
            try {
                let res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                let data = await res.json();
                if (!data.erro) {
                    document.getElementById("endereco").value = `${data.logradouro}, ${data.bairro}`;
                    calcularFrete();
                }
            } catch (e) {}
        }

        async function getCoords(end) {
            try {
                let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(end)}`;
                let res = await fetch(url);
                let data = await res.json();
                return data && data[0] ? { lat: data[0].lat, lon: data[0].lon } : null;
            } catch(e) { return null; }
        }

        function distancia(lat1, lon1, lat2, lon2) {
            let R = 6371;
            let dLat = (lat2 - lat1) * Math.PI / 180;
            let dLon = (lon2 - lon1) * Math.PI / 180;
            let a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        async function calcularFrete() {
            let cliente = document.getElementById("endereco").value;
            if (!cliente) return;
            document.getElementById("freteBox").innerHTML = "Calculando frete...";
            let c1 = await getCoords(RESTAURANTE_END);
            let c2 = await getCoords(cliente);
            if (c1 && c2) {
                let km = distancia(c1.lat, c1.lon, c2.lat, c2.lon);
                frete = Math.max(7, (km * 2.5) + 5);
            } else { frete = 10; }
            document.getElementById("freteBox").innerHTML = `Frete estimado: R$ ${frete.toFixed(2)}`;
        }

        function revisao() {
            dadosPedido = {
                nome: document.getElementById("nome").value,
                fone: document.getElementById("fone").value,
                tipo: document.getElementById("tipo").value,
                endereco: document.getElementById("endereco").value,
                num: document.getElementById("num").value,
                pag: document.getElementById("pag").value
            };
            if(!dadosPedido.nome || !dadosPedido.fone) { alert("Preencha nome e fone!"); return; }
            navigate(renderRevisao);
        }

        function renderRevisao() {
            let subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            let total = dadosPedido.tipo == "Entrega" ? subtotal + frete : subtotal;
            let html = "<h3>Revisão Final</h3><div class='card'>";
            cart.forEach(i => { html += `${i.qty}x ${i.name}<br>`; });
            html += `<hr>Subtotal: R$ ${subtotal.toFixed(2)}<br>`;
            if(dadosPedido.tipo == "Entrega") html += `Frete: R$ ${frete.toFixed(2)}<br>`;
            html += `<strong>Total: R$ ${total.toFixed(2)}</strong></div>`;
            html += `<button class="primary" onclick="finalizar()">ENVIAR PARA WHATSAPP</button>`;
            document.getElementById("app").innerHTML = html;
        }

        function finalizar() {
            let subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            let total = dadosPedido.tipo == "Entrega" ? subtotal + frete : subtotal;
            let msg = `*NOVO PEDIDO - LAENCASA*%0A%0A*Cliente:* ${dadosPedido.nome}%0A*WhatsApp:* ${dadosPedido.fone}%0A*Tipo:* ${dadosPedido.tipo}%0A`;
            if(dadosPedido.tipo == "Entrega") msg += `*Endereço:* ${dadosPedido.endereco}, ${dadosPedido.num}%0A`;
            msg += `%0A*ITENS:*%0A`;
            cart.forEach(i => { msg += `- ${i.qty}x ${i.name}%0A`; });
            msg += `%0A*Pagamento:* ${dadosPedido.pag}%0A*Total:* R$ ${total.toFixed(2)}`;
            window.open(`https://wa.me/5511952282056?text=${msg}`);
        }

        navigate(renderHome);
    </script>
